# setup/litellm/config.yaml — local LiteLLM proxy for workstation
#
# Start with: mise run litellm   (or: litellm --config setup/litellm/config.yaml)
# Endpoint:   http://localhost:4000/v1
# Key:        sk-infra-local  (only used locally — not a real secret)
#
# Set your API keys as environment variables before starting:
#   export OPENROUTER_API_KEY=sk-or-...   # recommended — covers all models
#   export ANTHROPIC_API_KEY=sk-ant-...  # optional — direct Claude, lower latency
#   export GOOGLE_API_KEY=AI...           # optional — direct Gemini
#   export OPENAI_API_KEY=sk-...          # optional — direct OpenAI
#
# You only need ONE provider to get started. OpenRouter is the easiest:
# it gives access to Claude, Gemini, GPT-4, and hundreds of free models
# with a single API key.
#
# opencode.json and .claude/settings.json already point to localhost:4000.

model_list:

  # ── Default alias ─────────────────────────────────────────────────────────
  # This is what OpenCode uses by default (model: "litellm/default" in opencode.json)
  # Routes to Claude Sonnet, falls back to cheap if unavailable
  - model_name: default
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4-5
      api_key: os.environ/OPENROUTER_API_KEY

  # ── Premium models via OpenRouter (one key covers all) ────────────────────
  - model_name: claude-sonnet
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4-5
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: claude-opus
    litellm_params:
      model: openrouter/anthropic/claude-opus-4
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: gemini-flash
    litellm_params:
      model: openrouter/google/gemini-flash-1.5
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openrouter/openai/gpt-4o-mini
      api_key: os.environ/OPENROUTER_API_KEY

  # ── Free tier (no cost, limited quality) ─────────────────────────────────
  - model_name: free
    litellm_params:
      model: openrouter/qwen/qwen3-coder:free
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: free2
    litellm_params:
      model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: cheap
    litellm_params:
      model: openrouter/qwen/qwen-turbo
      api_key: os.environ/OPENROUTER_API_KEY

  # ── Direct providers (optional — set API key env var to enable) ───────────
  # Uncomment if you have the key and want lower latency / avoid OpenRouter

  # Direct Anthropic (set ANTHROPIC_API_KEY)
  # - model_name: claude-direct
  #   litellm_params:
  #     model: anthropic/claude-sonnet-4-5
  #     api_key: os.environ/ANTHROPIC_API_KEY

  # Direct Gemini (set GOOGLE_API_KEY)
  # - model_name: gemini-direct
  #   litellm_params:
  #     model: gemini/gemini-1.5-flash
  #     api_key: os.environ/GOOGLE_API_KEY

  # Local Ollama (no key needed — must be running at localhost:11434)
  # - model_name: local
  #   litellm_params:
  #     model: ollama/llama3.2
  #     api_base: http://localhost:11434

litellm_settings:
  # Fallback chain: if a model fails (rate limit, auth error, timeout)
  # try the next one in the list automatically
  fallbacks:
    - {"default":      ["claude-sonnet", "cheap"]}
    - {"claude-sonnet": ["cheap"]}
    - {"free":         ["free2", "cheap"]}
    - {"free2":        ["cheap"]}
  request_timeout: 120
  num_retries: 1
  drop_params: true        # ignore unsupported params instead of erroring

general_settings:
  master_key: "sk-infra-local"
  # Uncomment to see full request/response logs (useful for debugging):
  # set_verbose: true

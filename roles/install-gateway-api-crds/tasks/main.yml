# Install Gateway API CRDs (standard channel) from upstream release.
# These must exist before Cilium's gatewayAPI.enabled=true is applied,
# otherwise the Cilium operator will log errors on startup.

# On a fresh install K3s may take a few seconds to be reachable from localhost
# via kubeconfig. Wait before attempting to apply CRDs.
- name: Wait for K3s API to be reachable from localhost
  ansible.builtin.command:
    cmd: kubectl get nodes
  register: api_check
  until: api_check.rc == 0
  retries: 24
  delay: 5
  changed_when: false

- name: Apply Gateway API CRDs
  kubernetes.core.k8s:
    state: present
    src: "{{ gateway_api_base_url }}/{{ item }}"
  loop:
    - gateway.networking.k8s.io_gatewayclasses.yaml
    - gateway.networking.k8s.io_gateways.yaml
    - gateway.networking.k8s.io_httproutes.yaml
    - gateway.networking.k8s.io_referencegrants.yaml
    - gateway.networking.k8s.io_grpcroutes.yaml

- name: Apply Gateway API Experimental TLSRoute CRD
  kubernetes.core.k8s:
    state: present
    src: "{{ gateway_api_experimental_base_url }}/gateway.networking.k8s.io_tlsroutes.yaml"

- name: Wait for Gateway API CRDs to be established
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: "{{ item }}"
  register: crd_info
  until: >
    crd_info.resources | length > 0 and
    (crd_info.resources[0].status.conditions | selectattr('type', 'equalto', 'Established') | selectattr('status', 'equalto', 'True') | list | length > 0)
  retries: 10
  delay: 5
  loop:
    - gatewayclasses.gateway.networking.k8s.io
    - gateways.gateway.networking.k8s.io
    - httproutes.gateway.networking.k8s.io
    - referencegrants.gateway.networking.k8s.io
    - grpcroutes.gateway.networking.k8s.io
    - tlsroutes.gateway.networking.k8s.io

neuvector_version: "2.8.12"
neuvector_namespace: neuvector
neuvector_dashboard_hostname: neuvector.cluster.home
neuvector_api_hostname: neuvector-api.cluster.home
neuvector_lb_ip: "192.168.178.204"
neuvector_pvc_enabled: true
# Cluster default is local-path, but this role uses smb-nas. The storage
# backend role must exist before installing/upgrading it.
neuvector_pvc_storage_class: "smb-nas"
neuvector_storage_role: "install-cifs-nas"
neuvector_pvc_size: "5Gi"
neuvector_scanner_enabled: true
neuvector_scanner_replicas: 1  # CM4 has limited resources
neuvector_cve_updater_enabled: false
neuvector_bootstrap_password: admin
pihole_namespace: pihole

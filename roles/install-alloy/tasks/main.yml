# Install Grafana Alloy via Helm on localhost
# Alloy is the OpenTelemetry-native telemetry pipeline (replaces Grafana Agent).
# This deployment configures Alloy as an OTLP receiver that forwards traces to Tempo.
# Chart: grafana/alloy (official, not deprecated)
#
# OTLP ports exposed on the Alloy Service:
#   4317 — gRPC (instrumented apps send traces here)
#   4318 — HTTP (alternative OTLP endpoint)
#
# To instrument an app: point OTEL_EXPORTER_OTLP_ENDPOINT to alloy.monitoring:4317

- name: Add grafana Helm repository
  kubernetes.core.helm_repository:
    name: grafana
    repo_url: https://grafana.github.io/helm-charts
  changed_when: false

- name: Check if Alloy release exists
  ansible.builtin.command:
    cmd: helm list -n {{ alloy_namespace }} -o json --filter alloy
  register: alloy_helm_list
  changed_when: false
  failed_when: false

- name: Set alloy release status fact
  ansible.builtin.set_fact:
    alloy_deployed: "{{ (alloy_helm_list.stdout | from_json | selectattr('status', 'equalto', 'deployed') | list | length) > 0 }}"
  when: alloy_helm_list.stdout | default('') | length > 0

- name: Set alloy release status fact (default not deployed)
  ansible.builtin.set_fact:
    alloy_deployed: false
  when: alloy_helm_list.stdout | default('') | length == 0

- name: Install or upgrade Alloy
  kubernetes.core.helm:
    name: alloy
    chart_ref: grafana/alloy
    chart_version: "{{ alloy_version }}"
    release_namespace: "{{ alloy_namespace }}"
    create_namespace: false
    wait: false
    values:
      alloy:
        stabilityLevel: generally-available

        extraPorts:
          - name: otlp-grpc
            port: 4317
            targetPort: 4317
            protocol: TCP
          - name: otlp-http
            port: 4318
            targetPort: 4318
            protocol: TCP

        configMap:
          create: true
          content: |
            // ── OTLP receiver — accepts traces from instrumented apps ──────────
            otelcol.receiver.otlp "default" {
              grpc { endpoint = "0.0.0.0:4317" }
              http { endpoint = "0.0.0.0:4318" }
              output {
                traces = [otelcol.exporter.otlp.tempo.input]
              }
            }

            // ── Forward traces to Tempo ────────────────────────────────────────
            otelcol.exporter.otlp "tempo" {
              client {
                endpoint = "http://tempo.{{ alloy_namespace }}.svc.cluster.local:4317"
                tls { insecure = true }
              }
            }
  when: not alloy_deployed

- name: Wait for Alloy rollout
  ansible.builtin.command:
    cmd: kubectl rollout status daemonset/alloy -n {{ alloy_namespace }} --timeout=180s
  register: alloy_rollout
  until: alloy_rollout.rc == 0
  retries: 18
  delay: 10
  changed_when: false

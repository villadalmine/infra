# Create the shared Cilium Gateway for all cluster.home HTTP/HTTPS services.
#
# ── Design ────────────────────────────────────────────────────────────────────
# One Gateway at 192.168.178.200 serves ALL services via HTTPRoute/GRPCRoute.
# Services use ClusterIP (no individual LoadBalancer IPs needed).
# Pi-hole wildcard *.cluster.home → .200 routes all DNS automatically.
# cert-manager wildcard *.cluster.home TLS secret is referenced by the Gateway.
#
# ── Listeners ─────────────────────────────────────────────────────────────────
# - HTTP  (port 80):  accept all hostnames, attach HTTPRoutes from any namespace
# - HTTPS (port 443): wildcard *.cluster.home TLS, attach HTTPRoutes from any namespace
#
# ── HTTPRoute pattern (for each service) ──────────────────────────────────────
# apiVersion: gateway.networking.k8s.io/v1
# kind: HTTPRoute
# metadata:
#   name: <service>
#   namespace: <service-namespace>
# spec:
#   parentRefs:
#     - name: cluster-gateway
#       namespace: gateway
#   hostnames: ["<service>.cluster.home"]
#   rules:
#     - backendRefs:
#         - name: <service-svc>
#           port: <port>
#
# ── IP pinning ────────────────────────────────────────────────────────────────
# The Gateway's LoadBalancer Service gets its IP from Cilium LB-IPAM.
# Pin it to .200 via the lbipam.cilium.io/ips annotation passthrough.

- name: Ensure gateway namespace exists
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ gateway_namespace }}"
    state: present

- name: Create shared Cilium Gateway
  kubernetes.core.k8s:
    definition:
      apiVersion: gateway.networking.k8s.io/v1
      kind: Gateway
      metadata:
        name: "{{ gateway_name }}"
        namespace: "{{ gateway_namespace }}"
        annotations:
          # Pin Cilium LB-IPAM IP to .200 for all *.cluster.home traffic
          lbipam.cilium.io/ips: "{{ gateway_ip }}"
      spec:
        gatewayClassName: cilium
        listeners:
          - name: http
            protocol: HTTP
            port: 80
            allowedRoutes:
              namespaces:
                from: All
          - name: https
            protocol: HTTPS
            port: 443
            hostname: "*.cluster.home"
            tls:
              mode: Terminate
              certificateRefs:
                - name: "{{ gateway_tls_secret }}"
                  namespace: "{{ gateway_namespace }}"
            allowedRoutes:
              namespaces:
                from: All
          - name: tls-passthrough
            protocol: TLS
            port: 443
            tls:
              mode: Passthrough
            allowedRoutes:
              namespaces:
                from: All
    state: present

- name: Wait for Gateway to be programmed and have an address
  kubernetes.core.k8s_info:
    kind: Gateway
    namespace: "{{ gateway_namespace }}"
    name: "{{ gateway_name }}"
  register: gw_info
  until: >
    gw_info.resources | length > 0 and
    (gw_info.resources[0].status.addresses | default([]) | length > 0)
  retries: 24
  delay: 5

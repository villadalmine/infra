- name: Ensure custom Storage backend is installed before deploying Hermes Agent
  ansible.builtin.include_role:
    name: "{{ hermes_storage_role }}"
  when: hermes_storage_class != 'local-path' and hermes_storage_role is defined

- name: Render Hermes MCP manifest
  ansible.builtin.template:
    src: hermes-static-mcp.yaml.j2
    dest: /tmp/hermes-static-mcp.yaml

- name: Apply Hermes MCP manifest
  ansible.builtin.command:
    cmd: kubectl apply -f /tmp/hermes-static-mcp.yaml
  changed_when: false

- name: Remove temporary Hermes MCP manifest
  ansible.builtin.file:
    path: /tmp/hermes-static-mcp.yaml
    state: absent

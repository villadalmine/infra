# Install Hermes Agent via Helm on localhost
# Self-improving AI agent with OpenRouter integration.
# Runs as non-root with strict security constraints.
#
# Requires OPENROUTER_API_KEY in roles/install-hermes-agent/defaults/secrets.yml

- name: Load Hermes Agent secrets (if secrets.yml exists)
  ansible.builtin.include_vars:
    file: "{{ role_path }}/defaults/secrets.yml"
  failed_when: false

- name: Create Hermes Agent namespace
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ hermes_namespace }}"
    state: present

- name: Create OpenRouter API key secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: hermes-secrets
        namespace: "{{ hermes_namespace }}"
      type: Opaque
      stringData:
        OPENROUTER_API_KEY: "{{ hermes_openrouter_api_key | default('') }}"
        TELEGRAM_BOT_TOKEN: "{{ hermes_telegram_token | default('') }}"
        DISCORD_BOT_TOKEN: "{{ hermes_discord_token | default('') }}"
  when: >
    hermes_openrouter_api_key | default('') | length > 0

- name: Create Hermes Agent PVC
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: hermes-data
        namespace: "{{ hermes_namespace }}"
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: "{{ hermes_storage_class }}"
        resources:
          requests:
            storage: "{{ hermes_storage_size }}"

- name: Deploy Hermes Agent
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: hermes-agent
        namespace: "{{ hermes_namespace }}"
        labels:
          app: hermes-agent
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: hermes-agent
        template:
          metadata:
            labels:
              app: hermes-agent
          spec:
            automountServiceAccountToken: false
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
              fsGroup: 1000
            nodeSelector:
              kubernetes.io/hostname: "{{ hermes_node_hostname }}"
            tolerations:
              - operator: Exists
            containers:
              - name: hermes-agent
                image: "{{ hermes_registry }}/{{ hermes_image_name }}:{{ hermes_image_tag }}"
                imagePullPolicy: IfNotPresent
                command:
                  - hermes
                  - gateway
                  - run
                args:
                  - --replace
                ports:
                  - containerPort: 8080
                    name: http
                    protocol: TCP
                env:
                  - name: HERMES_MODEL
                    value: "{{ hermes_model }}"
                  - name: HERMES_TEMPERATURE
                    value: "{{ hermes_temperature | string }}"
                  - name: HERMES_HOME
                    value: /opt/data
                  - name: OPENAI_API_BASE
                    value: "{{ hermes_litellm_base_url }}"
                  - name: OPENAI_API_KEY
                    value: "{{ hermes_litellm_master_key }}"
                envFrom:
                  - secretRef:
                      name: hermes-secrets
                securityContext:
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop:
                      - ALL
                resources:
                  requests:
                    cpu: "{{ hermes_cpu_request }}"
                    memory: "{{ hermes_memory_request }}"
                  limits:
                    cpu: "{{ hermes_cpu_limit }}"
                    memory: "{{ hermes_memory_limit }}"
                volumeMounts:
                  - name: hermes-data
                    mountPath: /opt/data
                  - name: hermes-gateway-config
                    mountPath: /opt/data/gateway.json
                    subPath: gateway.json
                  - name: tmp
                    mountPath: /tmp
                readinessProbe:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
                livenessProbe:
                  httpGet:
                    path: /health
                    port: 8080
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
            volumes:
              - name: hermes-data
                persistentVolumeClaim:
                  claimName: hermes-data
              - name: hermes-gateway-config
                configMap:
                  name: hermes-gateway-config
              - name: tmp
                emptyDir:
                  sizeLimit: 128Mi

- name: Create Hermes Gateway ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: hermes-gateway-config
        namespace: "{{ hermes_namespace }}"
      data:
        gateway.json: "{{ hermes_gateway_config }}"

- name: Create Hermes Agent Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: hermes-agent
        namespace: "{{ hermes_namespace }}"
      spec:
        type: ClusterIP
        selector:
          app: hermes-agent
        ports:
          - name: http
            port: 8080
            targetPort: 8080
            protocol: TCP

- name: Create HTTPRoute for Hermes Agent
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: hermes-agent
        namespace: "{{ hermes_namespace }}"
      spec:
        parentRefs:
          - name: cluster-gateway
            namespace: gateway
        hostnames:
          - "{{ hermes_hostname }}"
        rules:
          - backendRefs:
              - name: hermes-agent
                port: 8080

- name: Create NetworkPolicy for Hermes Agent (egress to OpenRouter only)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: hermes-agent-egress
        namespace: "{{ hermes_namespace }}"
      spec:
        podSelector:
          matchLabels:
            app: hermes-agent
        policyTypes:
          - Egress
        egress:
          - to: []
            ports:
              - port: 53
                protocol: UDP
              - port: 53
                protocol: TCP
          - to:
              - podSelector:
                  matchLabels:
                    app: litellm-proxy
            ports:
              - port: 4000
                protocol: TCP

- name: Wait for Hermes Agent rollout
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/hermes-agent -n {{ hermes_namespace }} --timeout=180s
  register: hermes_rollout
  until: hermes_rollout.rc == 0
  retries: 18
  delay: 10
  changed_when: false

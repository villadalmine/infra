hermes_version: "latest"
hermes_namespace: ai
hermes_hostname: hermes.cluster.home

# Model configuration (OpenRouter direct)
hermes_model: "openai/gpt-4o-mini"
hermes_temperature: 0.7
hermes_inference_provider: "openrouter"

# Resource limits (CM4-friendly)
hermes_cpu_limit: "500m"
hermes_cpu_request: "100m"
hermes_memory_limit: "512Mi"
hermes_memory_request: "128Mi"

# Schedule Hermes on the high-resource node.
hermes_node_hostname: "srv-rk1-nvme-01"

# Storage for ~/.hermes (skills, memory, config)
# Cluster default is local-path, but this role uses smb-nas. The storage
# backend role must exist before installing/upgrading it.
hermes_storage_size: "100Gi"
hermes_storage_class: "smb-nas"

# Platform integrations (set via secrets.yml)
hermes_telegram_enabled: true
hermes_discord_enabled: false

# Telegram gateway settings (polling mode by default)
hermes_telegram_allowed_users: "8492872858"
hermes_telegram_webhook_url: ""

# Local registry for ARM64 image
hermes_registry: "registry.registry:5000"
hermes_image_name: "ai/hermes-agent"
hermes_image_tag: "0.7.0"

# Kubernetes MCP sidecar (HTTP /mcp endpoint)
hermes_mcp_image_name: "ai/kubernetes-mcp-server"
hermes_mcp_image_tag: "v0.0.60"

# Hermes MCP test/server configuration
hermes_mcp_enabled: true
hermes_mcp_url: "http://127.0.0.1:8080/mcp"
hermes_mcp_timeout: 120
hermes_mcp_connect_timeout: 30

hermes_system_prompt: |
  You are an assistant for Kubernetes cluster inspection.
  When the user asks about Kubernetes pods, namespaces, deployments, or logs, you must use the Kubernetes MCP tools.
  Do not use kubectl, oc, or terminal commands for cluster inspection.
  If a Kubernetes MCP tool is available, call it directly.

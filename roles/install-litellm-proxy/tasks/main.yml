# LiteLLM proxy deployment with multi-tenant API tokens.
# Metrics enabled for Prometheus discovery.

- name: Load OpenRouter API keys (from litellm-proxy secrets)
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../roles/install-litellm-proxy/defaults/secrets.yml"

- name: Create LiteLLM namespace
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ litellm_namespace }}"
    state: present

- name: Create LiteLLM secrets
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: litellm-secrets
        namespace: "{{ litellm_namespace }}"
      type: Opaque
      stringData:
        OPENROUTER_API_KEY: "{{ hermes_openrouter_api_key | default('') }}"
        HOLMES_OPENROUTER_API_KEY: "{{ holmes_openrouter_api_key | default('') }}"
        KAGENT_OPENROUTER_API_KEY: "{{ kagent_openrouter_api_key | default('') }}"
        OPENCLAW_OPENROUTER_API_KEY: "{{ openclaw_openrouter_api_key | default('') }}"
  when: hermes_openrouter_api_key | default('') | length > 0

- name: Create LiteLLM proxy ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: litellm-proxy-config
        namespace: "{{ litellm_namespace }}"
      data:
        config.yaml: |
          model_list:
            # ── Hermes routing ──────────────────────────────────────────────
            - model_name: hermes-qwen
              litellm_params:
                model: openrouter/qwen/qwen3-coder:free
                api_key: os.environ/OPENROUTER_API_KEY
            - model_name: free2
              litellm_params:
                model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
                api_key: os.environ/OPENROUTER_API_KEY
            - model_name: cheap
              litellm_params:
                model: openrouter/qwen/qwen-turbo
                api_key: os.environ/OPENROUTER_API_KEY
            # Recommended higher-quality Qwen model (pro). Use this for heavier workloads.
            - model_name: qwen-pro
              litellm_params:
                model: openrouter/qwen/qwen-pro
                api_key: os.environ/OPENROUTER_API_KEY

            # ── Holmes routing ──────────────────────────────────────────────
            - model_name: holmes-llama
              litellm_params:
                model: openrouter/meta-llama/llama-3.1-8b-instruct:free
                api_key: os.environ/HOLMES_OPENROUTER_API_KEY
            - model_name: holmes-free2
              litellm_params:
                model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
                api_key: os.environ/HOLMES_OPENROUTER_API_KEY
            - model_name: holmes-cheap
              litellm_params:
                model: openrouter/qwen/qwen-turbo
                api_key: os.environ/HOLMES_OPENROUTER_API_KEY

            # ── OpenClaw routing ────────────────────────────────────────────
            - model_name: openclaw-gemini
              litellm_params:
                model: openrouter/google/gemini-2.5-pro-exp-03-25:free
                api_key: os.environ/OPENCLAW_OPENROUTER_API_KEY
            - model_name: gemini-free2
              litellm_params:
                model: openrouter/google/gemini-2.0-flash-exp:free
                api_key: os.environ/OPENCLAW_OPENROUTER_API_KEY

            # ── Kagent routing ──────────────────────────────────────────────
            - model_name: kagent-orchestrator
              litellm_params:
                model: openrouter/qwen/qwen-turbo
                api_key: os.environ/KAGENT_OPENROUTER_API_KEY

            # ── Legacy Aliases & Tool Defaults ──────────────────────────────
            - model_name: free
              litellm_params:
                model: openrouter/qwen/qwen3-coder:free
                api_key: os.environ/OPENROUTER_API_KEY
            - model_name: gpt-5.4
              litellm_params:
                model: openrouter/meta-llama/llama-3.1-8b-instruct:free
                api_key: os.environ/HOLMES_OPENROUTER_API_KEY
            - model_name: gemini-free
              litellm_params:
                model: openrouter/google/gemini-2.5-pro-exp-03-25:free
                api_key: os.environ/OPENCLAW_OPENROUTER_API_KEY
            # Backwards-compat alias: some clients (OpenClaw) may prefix provider
            # (eg. openai/gemini-free). Provide a passthrough alias so those IDs
            # resolve to the same backend and avoid Unknown model errors.
            - model_name: openai/gemini-free
              litellm_params:
                model: openrouter/google/gemini-2.5-pro-exp-03-25:free
                api_key: os.environ/OPENCLAW_OPENROUTER_API_KEY
            - model_name: gpt-4o
              litellm_params:
                model: openrouter/qwen/qwen-turbo
                api_key: os.environ/OPENROUTER_API_KEY

            # ── Premium models ──────────────────────────────────────────────
            - model_name: claude-sonnet
              litellm_params:
                model: openrouter/anthropic/claude-sonnet-4-5
                api_key: os.environ/OPENROUTER_API_KEY
            - model_name: gemini-flash
              litellm_params:
                model: openrouter/google/gemini-flash-1.5
                api_key: os.environ/OPENROUTER_API_KEY
            - model_name: default
              litellm_params:
                model: openrouter/anthropic/claude-sonnet-4-5
                api_key: os.environ/OPENROUTER_API_KEY

          litellm_settings:
            fallbacks:
              - {"hermes-qwen": ["qwen-pro", "free2", "cheap"]}
              - {"holmes-llama": ["holmes-free2", "holmes-cheap"]}
              - {"openclaw-gemini": ["hermes-qwen", "gemini-free2", "cheap"]}
              - {"kagent-orchestrator": ["cheap"]}
              - {"free": ["free2", "cheap"]}
              - {"gpt-5.4": ["holmes-free2", "holmes-cheap"]}
              - {"gemini-free": ["openclaw-gemini", "free2", "cheap"]}
            request_timeout: 120
            num_retries: 1
            set_verbose: false
            success_callback: ["prometheus"]
            failure_callback: ["prometheus"]

          general_settings:
            master_key: "{{ litellm_master_key }}"

- name: Deploy LiteLLM proxy
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: litellm-proxy
        namespace: "{{ litellm_namespace }}"
        labels:
          app: litellm-proxy
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: litellm-proxy
        template:
          metadata:
            labels:
              app: litellm-proxy
          spec:
            tolerations:
              - operator: Exists
            containers:
              - name: litellm-proxy
                image: ghcr.io/berriai/litellm:main-latest
                ports:
                  - containerPort: 4000
                env:
                  - name: OPENROUTER_API_KEY
                    valueFrom:
                      secretKeyRef:
                        name: litellm-secrets
                        key: OPENROUTER_API_KEY
                  - name: HOLMES_OPENROUTER_API_KEY
                    valueFrom:
                      secretKeyRef:
                        name: litellm-secrets
                        key: HOLMES_OPENROUTER_API_KEY
                  - name: KAGENT_OPENROUTER_API_KEY
                    valueFrom:
                      secretKeyRef:
                        name: litellm-secrets
                        key: KAGENT_OPENROUTER_API_KEY
                  - name: OPENCLAW_OPENROUTER_API_KEY
                    valueFrom:
                      secretKeyRef:
                        name: litellm-secrets
                        key: OPENCLAW_OPENROUTER_API_KEY
                  - name: LITELLM_MASTER_KEY
                    value: "{{ litellm_master_key }}"
                volumeMounts:
                  - name: config-volume
                    mountPath: /app/config.yaml
                    subPath: config.yaml
                args:
                  - --config
                  - /app/config.yaml
                  - --port
                  - "4000"
            volumes:
              - name: config-volume
                configMap:
                  name: litellm-proxy-config

- name: Create LiteLLM proxy Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: litellm-proxy
        namespace: "{{ litellm_namespace }}"
        labels:
          app: litellm-proxy # Label for ServiceMonitor discovery
      spec:
        selector:
          app: litellm-proxy
        ports:
          - protocol: TCP
            port: 4000
            targetPort: 4000
        type: ClusterIP

- name: Check if monitoring namespace exists
  ansible.builtin.command:
    cmd: kubectl get namespace monitoring
  register: litellm_monitoring_ns
  changed_when: false
  failed_when: false

- name: Create LiteLLM Grafana dashboard ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: litellm-ai-traffic-dashboard
        namespace: monitoring
        labels:
          grafana_dashboard: "1"
      data:
        litellm-ai-traffic.json: |
          {% raw %}
          {
            "uid": "litellm-ai-traffic",
            "title": "LiteLLM AI Traffic",
            "annotations": { "list": [] },
            "description": "LiteLLM AI traffic — requests, latency, tokens, spend per model. Models: openclaw-gemini=OpenClaw, hermes-qwen=Hermes, holmes-llama=Holmes, kagent-orchestrator=Kagent",
            "editable": true,
            "graphTooltip": 1,
            "id": null,
            "panels": [
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "reqps" } },
                "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
                "id": 1,
                "targets": [
                  { "expr": "sum by (requested_model) (rate(litellm_requests_metric_total[5m]))", "legendFormat": "{{requested_model}}", "refId": "A" }
                ],
                "title": "📊 Requests/s by Model (service)",
                "type": "timeseries"
              },
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "s" } },
                "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
                "id": 2,
                "targets": [
                  { "expr": "histogram_quantile(0.95, sum by (requested_model,le) (rate(litellm_request_total_latency_metric_bucket[5m])))", "legendFormat": "p95 {{requested_model}}", "refId": "A" },
                  { "expr": "histogram_quantile(0.50, sum by (requested_model,le) (rate(litellm_request_total_latency_metric_bucket[5m])))", "legendFormat": "p50 {{requested_model}}", "refId": "B" }
                ],
                "title": "⏱ Latency p50/p95 by Model",
                "type": "timeseries"
              },
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "short" } },
                "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
                "id": 3,
                "targets": [
                  { "expr": "sum by (requested_model) (rate(litellm_total_tokens_metric_total[5m]))", "legendFormat": "{{requested_model}}", "refId": "A" }
                ],
                "title": "🔢 Tokens/s by Model",
                "type": "timeseries"
              },
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "currencyUSD", "decimals": 5 } },
                "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
                "id": 4,
                "options": { "reduceOptions": { "calcs": ["sum"] }, "orientation": "horizontal", "colorMode": "background" },
                "targets": [
                  { "expr": "sum by (requested_model) (litellm_spend_metric_total)", "legendFormat": "{{requested_model}}", "refId": "A" }
                ],
                "title": "💰 Total Spend by Model (USD)",
                "type": "bargauge"
              },
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "reqps" } },
                "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
                "id": 5,
                "targets": [
                  { "expr": "sum by (requested_model) (rate(litellm_requests_metric_total{status_code!~\"2..\"}[5m]))", "legendFormat": "err {{requested_model}}", "refId": "A" }
                ],
                "title": "❌ Error Rate by Model",
                "type": "timeseries"
              },
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "short" } },
                "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
                "id": 6,
                "targets": [
                  { "expr": "sum by (fallback_model) (rate(litellm_deployment_successful_fallbacks_total[5m]))", "legendFormat": "→ {{fallback_model}}", "refId": "A" }
                ],
                "title": "🔄 Fallback Activations",
                "type": "timeseries"
              },
              {
                "datasource": { "type": "prometheus", "uid": "${datasource}" },
                "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" }, "unit": "short", "decimals": 0 } },
                "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
                "id": 7,
                "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true },
                "targets": [
                  { "expr": "sum by (agent) (label_replace(label_replace(label_replace(label_replace(litellm_requests_metric_total, \"agent\", \"Hermes\", \"requested_model\", \"hermes-qwen|free|free2|cheap|gpt-4o|claude-sonnet|gemini-flash|default\"), \"agent\", \"Holmes\", \"requested_model\", \"holmes-llama|holmes-free2|holmes-cheap|gpt-5.4\"), \"agent\", \"kagent\", \"requested_model\", \"kagent-orchestrator\"), \"agent\", \"OpenClaw\", \"requested_model\", \"openclaw-gemini|gemini-free|gemini-free2\"))", "legendFormat": "{{agent}}", "refId": "A" }
                ],
                "title": "🤖 Total Queries by Agent",
                "type": "bargauge"
              }
            ],
            "refresh": "30s",
            "schemaVersion": 38,
            "tags": ["litellm", "ai", "llm", "openclaw", "hermes", "kagent"]
          }
          {% endraw %}
  when: litellm_monitoring_ns.rc == 0

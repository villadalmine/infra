cilium_version: "1.19.2"
cilium_namespace: kube-system

# API server address used by Cilium's kube-proxy replacement.
# Must match the K3s server node IP.
k3s_api_server_host: "192.168.178.30"
k3s_api_server_port: "6443"

# ── Gateway API ────────────────────────────────────────────────────────────────
# Requires Gateway API CRDs to be installed BEFORE this is applied.
# The install-gateway-api-crds role must run earlier in the play.
# Enabling this automatically sets enable-envoy-config=true in cilium-config.
cilium_gateway_api_enabled: true

# externalTrafficPolicy: must be "Cluster" when using Cilium L2 Announcements.
# The L2 Announcer docs explicitly state it is incompatible with "Local" —
# "Local" may cause the VIP to be announced on nodes without pods, dropping traffic.
# Cilium handles load balancing entirely in BPF, so "Cluster" is correct here.
cilium_gateway_external_traffic_policy: "Cluster"

# hostNetwork: mutually exclusive with LoadBalancer mode. Keep disabled.
cilium_gateway_host_network_enabled: false

# ── Hubble observability ──────────────────────────────────────────────────────
# Hubble + relay required for `hubble observe` CLI debugging.
cilium_hubble_enabled: true
cilium_hubble_relay_enabled: true

# ── Hubble Metrics ────────────────────────────────────────────────────────────
# Hubble metrics with OpenMetrics support for exemplars and trace correlation.
# Profile options: basic, security, full
cilium_hubble_metrics_profile: "full"
cilium_hubble_metrics_enabled: true
cilium_hubble_enable_open_metrics: true

# Predefined metric profiles for different use cases
cilium_hubble_metrics_profiles:
  basic:
    - "drop"
    - "tcp"
    - "flow"
    - "icmp"
    - "http"
  security:
    - "drop:sourceContext=identity;destinationContext=identity"
    - "tcp:sourceContext=identity;destinationContext=identity" 
    - "flow:sourceContext=identity;destinationContext=identity"
    - "policy:sourceContext=identity;destinationContext=identity"
  full:
    - "drop:sourceContext=identity;destinationContext=identity"
    - "tcp:sourceContext=identity;destinationContext=identity"
    - "flow:sourceContext=identity;destinationContext=identity"
    - "flow:sourceContext=identity;destinationContext=identity;encrypted"
    - "flow:sourceContext=identity;destinationContext=identity;unencrypted"
    - "icmp:sourceContext=identity;destinationContext=identity" 
    - "http:exemplars=true;sourceContext=identity;destinationContext=identity"
    - "httpV2:exemplars=true;sourceContext=identity;destinationContext=identity"
    - "policy:sourceContext=identity;destinationContext=identity"
    - "port-distribution:sourceContext=identity;destinationContext=identity"

# ── L2 Announcements (replaces MetalLB) ───────────────────────────────────────
# Cilium natively handles ARP for LoadBalancer IPs via leader election + leases.
# LB-IPAM (always enabled) assigns IPs from CiliumLoadBalancerIPPool CRDs.
# CiliumL2AnnouncementPolicy selects which services to announce and on which iface.
# k8sClientRateLimit: sized for ~5 LoadBalancer services at 5s renew deadline.
# QPS formula: #services * (1 / leaseRenewDeadline) = 5 * (1/5) = 1 → round up to 10
cilium_l2announcements_enabled: true
cilium_l2announcements_lease_duration: "15s"
cilium_l2announcements_renew_deadline: "5s"
cilium_l2announcements_retry_period: "2s"
cilium_k8s_client_rate_limit_qps: 10
cilium_k8s_client_rate_limit_burst: 20

# ── Ingress Controller ─────────────────────────────────────────────────────────
# Disabled — all services use Gateway API (HTTPRoute), not classic Ingress.
cilium_ingress_controller_enabled: false

# These settings are irrelevant when ingressController is disabled but kept
# for documentation purposes.
cilium_ingress_default: false
cilium_ingress_enforce_https: false
cilium_ingress_loadbalancer_mode: "shared"
cilium_ingress_external_traffic_policy: "Cluster"

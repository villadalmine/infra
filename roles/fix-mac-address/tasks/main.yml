# Fix MAC address on RK1 nodes (Rockchip RK3588S on TuringPi 2).
# Problem: RK1 modules use a locally-administered MAC that can change between
# reboots, causing the DHCP server to assign a different IP on each boot.
#
# Fix: Use the current MAC as permanent by writing it into a systemd-networkd
# .link file. This tells the kernel to always apply this MAC to the interface
# regardless of what the firmware reports.
#
# Run manually on RK1 nodes only:
#   ansible-playbook playbooks/fix-mac.yml -i inventory/hosts.ini --limit rk1_nodes

- name: Detect ethernet interface name
  ansible.builtin.shell: |
    ip -o link show | grep -v lo | grep -v LOOPBACK | awk '{print $2}' | tr -d ':' | head -1
  register: eth_iface
  changed_when: false

- name: Get current MAC address of ethernet interface
  ansible.builtin.shell: |
    cat /sys/class/net/{{ eth_iface.stdout }}/address
  register: current_mac
  changed_when: false

- name: Show detected interface and MAC
  ansible.builtin.debug:
    msg: "Interface: {{ eth_iface.stdout }}, MAC: {{ current_mac.stdout }}"

- name: Create systemd-networkd link file to pin MAC address permanently
  ansible.builtin.copy:
    dest: "/etc/systemd/network/10-{{ eth_iface.stdout }}-mac.link"
    content: |
      [Match]
      OriginalName={{ eth_iface.stdout }}

      [Link]
      MACAddress={{ current_mac.stdout }}
      NamePolicy=keep kernel database onboard slot path
    owner: root
    group: root
    mode: "0644"
  register: link_file

- name: Disable cloud-init network management (prevents overwriting static config)
  ansible.builtin.copy:
    dest: /etc/cloud/cloud.cfg.d/99-disable-network.cfg
    content: "network: {config: disabled}\n"
    owner: root
    group: root
    mode: "0644"

- name: Create static netplan config with pinned MAC and fixed IP
  ansible.builtin.template:
    src: static-ip.yaml.j2
    dest: /etc/netplan/60-static.yaml
    owner: root
    group: root
    mode: "0600"
  register: netplan_changed

- name: Apply netplan configuration
  ansible.builtin.command: netplan apply
  when: netplan_changed.changed or link_file.changed
  changed_when: true

- name: Reload systemd-networkd to pick up link file
  ansible.builtin.systemd:
    name: systemd-networkd
    state: restarted
  when: link_file.changed

# Install Docker Registry v2 via kubectl on localhost
# Simple ARM64-compatible registry for storing custom images.
# Exposed via HTTPRoute at registry.cluster.home

- name: Create registry namespace
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ registry_namespace }}"
    state: present

- name: Create registry PVC
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: registry-data
        namespace: "{{ registry_namespace }}"
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: "{{ registry_storage_class }}"
        resources:
          requests:
            storage: "{{ registry_storage_size }}"

- name: Deploy registry
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: registry
        namespace: "{{ registry_namespace }}"
        labels:
          app: registry
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: registry
        template:
          metadata:
            labels:
              app: registry
          spec:
            containers:
              - name: registry
                image: "registry:{{ registry_version }}"
                ports:
                  - containerPort: 5000
                    name: http
                env:
                  - name: REGISTRY_STORAGE_DELETE_ENABLED
                    value: "true"
                volumeMounts:
                  - name: data
                    mountPath: /var/lib/registry
                resources:
                  requests:
                    cpu: "{{ registry_cpu_request }}"
                    memory: "{{ registry_memory_request }}"
                  limits:
                    cpu: "{{ registry_cpu_limit }}"
                    memory: "{{ registry_memory_limit }}"
            volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: registry-data

- name: Create registry Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: registry
        namespace: "{{ registry_namespace }}"
      spec:
        type: ClusterIP
        selector:
          app: registry
        ports:
          - name: http
            port: 5000
            targetPort: 5000

- name: Create HTTPRoute for registry
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: registry
        namespace: "{{ registry_namespace }}"
      spec:
        parentRefs:
          - name: cluster-gateway
            namespace: gateway
        hostnames:
          - "{{ registry_hostname }}"
        rules:
          - backendRefs:
              - name: registry
                port: 5000

- name: Wait for registry rollout
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/registry -n {{ registry_namespace }} --timeout=180s
  register: registry_rollout
  until: registry_rollout.rc == 0
  retries: 18
  delay: 10
  changed_when: false

- name: Get registry ClusterIP
  ansible.builtin.command:
    cmd: kubectl get svc registry -n {{ registry_namespace }} -o jsonpath='{.spec.clusterIP}'
  register: registry_clusterip
  changed_when: false

- name: Ensure /etc/rancher/k3s directory exists on all nodes
  ansible.builtin.file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true
  delegate_to: "{{ item }}"
  loop: "{{ groups['k3s_nodes'] }}"

- name: Configure K3s registries.yaml on all nodes (insecure mirror to ClusterIP)
  ansible.builtin.copy:
    content: |
      mirrors:
        "registry.registry:5000":
          endpoint:
            - "http://{{ registry_clusterip.stdout }}:5000"
    dest: /etc/rancher/k3s/registries.yaml
    owner: root
    group: root
    mode: '0644'
  become: true
  delegate_to: "{{ item }}"
  loop: "{{ groups['k3s_nodes'] }}"
  register: registries_yaml

- name: Restart K3s server if registries.yaml changed
  ansible.builtin.systemd:
    name: k3s
    state: restarted
  become: true
  delegate_to: "{{ item }}"
  loop: "{{ groups['server_nodes'] }}"
  when: registries_yaml.changed

- name: Restart K3s agent if registries.yaml changed
  ansible.builtin.systemd:
    name: k3s-agent
    state: restarted
  become: true
  delegate_to: "{{ item }}"
  loop: "{{ groups['agent_nodes'] }}"
  when: registries_yaml.changed

registry_version: "2"
registry_namespace: registry
registry_hostname: registry.cluster.home
registry_storage_size: "100Gi"
# Cluster default is local-path. This role overrides to smb-nas, so the
# storage backend role must exist before installing/upgrading it.
registry_storage_class: "smb-nas"
registry_storage_access_mode: "ReadWriteMany"
registry_cpu_request: "50m"
registry_cpu_limit: "200m"
registry_memory_request: "64Mi"
registry_memory_limit: "256Mi"

# Build Hermes Agent ARM64 image using kaniko in-cluster.
# Clones the hermes-agent repo, builds with kaniko, pushes to local registry.

- name: Ensure custom Storage backend is installed before running Hermes Agent image build
  ansible.builtin.include_role:
    name: "{{ kaniko_storage_role }}"
  when: kaniko_storage_class != 'local-path' and kaniko_storage_role is defined

- name: Create kaniko namespace
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ kaniko_namespace }}"
    state: present

- name: Create kaniko PVC for build cache
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: kaniko-cache
        namespace: "{{ kaniko_namespace }}"
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: "{{ kaniko_storage_class }}"
        resources:
          requests:
            storage: "{{ kaniko_storage_size }}"

- name: Create kaniko PVC for build workspace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: kaniko-workspace
        namespace: "{{ kaniko_namespace }}"
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: "{{ kaniko_workspace_storage_class }}"
        resources:
          requests:
            storage: "{{ kaniko_workspace_storage_size }}"

- name: Recreate kaniko Job when the pod template changes
  kubernetes.core.k8s:
    state: absent
    api_version: batch/v1
    kind: Job
    namespace: "{{ kaniko_namespace }}"
    name: build-hermes-arm64

- name: Create kaniko Job to build Hermes Agent ARM64 image
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: build-hermes-arm64
        namespace: "{{ kaniko_namespace }}"
      spec:
        template:
          spec:
            initContainers:
              - name: clone-source
                image: alpine/git:2.47.2
                command:
                  - sh
                  - -ec
                  - |
                    rm -rf /workspace/source || true
                    git clone --depth=1 --filter=blob:none --single-branch --no-tags --branch {{ hermes_git_ref }} {{ hermes_git_repo }} /workspace/source
                volumeMounts:
                  - name: workspace
                    mountPath: /workspace
            containers:
              - name: kaniko
                image: gcr.io/kaniko-project/executor:latest
                args:
                  - "--dockerfile=/workspace/source/Dockerfile"
                  - "--context=dir:///workspace/source"
                  - "--cache=true"
                  - "--cache-dir=/cache"
                  - "--destination={{ hermes_registry }}/{{ hermes_image_name }}:{{ hermes_image_tag }}"
                  - "--insecure"
                  - "--skip-tls-verify"
                  - "--snapshot-mode=redo"
                  - "--compression=zstd"
                  - "--compression-level=1"
                volumeMounts:
                  - name: dockerfile
                    mountPath: /workspace/source/Dockerfile
                    subPath: Dockerfile
                  - name: cache
                    mountPath: /cache
                  - name: workspace
                    mountPath: /workspace
                resources:
                  requests:
                    cpu: "1"
                    memory: "8Gi"
                  limits:
                    cpu: "4"
                    memory: "20Gi"
            nodeSelector:
              kubernetes.io/hostname: "{{ kaniko_node_hostname }}"
            tolerations:
              - operator: Exists
            volumes:
              - name: dockerfile
                configMap:
                  name: hermes-dockerfile
              - name: cache
                persistentVolumeClaim:
                  claimName: kaniko-cache
              - name: workspace
                persistentVolumeClaim:
                  claimName: kaniko-workspace
            restartPolicy: Never
        backoffLimit: 3

- name: Create ConfigMap with Hermes Dockerfile
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: hermes-dockerfile
        namespace: "{{ kaniko_namespace }}"
      data:
        Dockerfile: |
          {{ lookup('template', 'Dockerfile.j2') }}

- name: Wait for kaniko job to complete
  ansible.builtin.command:
    cmd: kubectl wait --for=condition=complete job/build-hermes-arm64 -n {{ kaniko_namespace }} --timeout=3600s
  register: kaniko_wait
  changed_when: false
  failed_when: kaniko_wait.rc != 0

k3s_token: myrandompassword
k3s_version: v1.35.2+k3s1
k3s_kubeconfig_mode: "644"

k3s_server_exec: >
  --flannel-backend=none
  --disable-network-policy
  --write-kubeconfig-mode 644
  --disable servicelb
  --token {{ k3s_token }}
  --disable-cloud-controller
  --disable-kube-proxy
  --disable traefik
  --disable metrics-server

# k3s_agent_exec: "agent --server https://{{ hostvars['srv-rk1-01'].ansible_host }}:6443 --token {{ k3s_token }}"
k3s_agent_exec: "agent --server https://{{ hostvars[groups['server_nodes'][0]]['ansible_host'] }}:6443 --token {{ k3s_token }}"

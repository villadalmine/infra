# Getthe list of services on the system, leverage when deciding to install k3s
- name: Populate service facts
  ansible.builtin.service_facts:


- name: Establecer el hostname usando hostnamectl
  ansible.builtin.command: "hostnamectl set-hostname {{ inventory_hostname }}"
  become: true
  changed_when: false # Agregamos esto para que Ansible no lo marque siempre como "changed" si ya tiene el nombre correcto.

- name: Asegurar que el nodo pueda resolver su propio nombre en /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ inventory_hostname }}"
    state: present
  become: true

- name: Persist inotify sysctl tuning
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-k3s-inotify.conf
    content: |
      fs.inotify.max_user_watches = {{ k3s_sysctl_inotify_max_user_watches }}
      fs.inotify.max_user_instances = {{ k3s_sysctl_inotify_max_user_instances }}
    mode: "0644"
  become: true
  notify: Reload systemd sysctl
  when: "'k3s_nodes' in group_names"


- name: Check if K3s server is running
  ansible.builtin.command:
    cmd: systemctl is-active k3s
  register: k3s_server_active
  failed_when: false
  changed_when: false

- name: Download K3s installation script on Server node(s)
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: "0755"
  become: true
  when:
    - "'server_nodes' in group_names"
    - "k3s_server_active.stdout != 'active'"
  changed_when: "'server_nodes' in group_names"

- name: Install K3s server
  ansible.builtin.shell: |
    /bin/bash -c 'set -o pipefail; /tmp/k3s-install.sh'
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: "{{ k3s_server_exec }}"
    K3S_KUBECONFIG_MODE: "{{ k3s_kubeconfig_mode }}"
  when:
    - "'server_nodes' in group_names"
    - "k3s_server_active.stdout != 'active'"
  changed_when: "'server_nodes' in group_names"

- name: Ensure K3s server is started
  ansible.builtin.systemd:
    name: k3s
    state: started
    enabled: true
  when:
    - "'server_nodes' in group_names"
    - "k3s_server_active.stdout != 'active'"
  changed_when: false

- name: Check if K3s agent is running
  ansible.builtin.command:
    cmd: systemctl is-active k3s-agent
  register: k3s_agent_active
  failed_when: false
  changed_when: false

- name: Download k3s and install script on Agent node(s)
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: "0755"
  become: true
  when:
    - "'agent_nodes' in group_names"
    - "k3s_agent_active.stdout != 'active'"
  changed_when: "'agent_nodes' in group_names"

- name: Install K3s agent
  ansible.builtin.shell: |
    /bin/bash -c 'set -o pipefail; /tmp/k3s-install.sh'
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: "{{ k3s_agent_exec }}"
  when:
    - "'agent_nodes' in group_names"
    - "k3s_agent_active.stdout != 'active'"
  changed_when: "'agent_nodes' in group_names"

- name: Ensure K3s agent is started
  ansible.builtin.systemd:
    name: k3s-agent
    state: started
    enabled: true
  when:
    - "'agent_nodes' in group_names"
    - "k3s_agent_active.stdout != 'active'"
  changed_when: false

- name: Install K3s agent
  ansible.builtin.shell: |
    /bin/bash -c 'set -o pipefail; /tmp/k3s-install.sh'
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: "{{ k3s_agent_exec }}"
  when:
    - "'agent_nodes' in group_names"
    - "k3s_agent_active.stdout != 'active'"
  changed_when: "'agent_nodes' in group_names"

- name: Ensure K3s agent is started
  ansible.builtin.systemd:
    name: k3s-agent
    state: started
    enabled: true
  when:
    - "'agent_nodes' in group_names"
    - "k3s_agent_active.stdout != 'active'"
  changed_when: false

- name: Wait for K3s API to be ready
  ansible.builtin.command:
    cmd: k3s kubectl get nodes
  become: true
  register: k3s_api_ready
  until: k3s_api_ready.rc == 0
  retries: 24
  delay: 5
  when: "'server_nodes' in group_names"
  changed_when: false

- name: Ensure server node has worker role label
  ansible.builtin.command:
    cmd: k3s kubectl label node --selector kubernetes.io/hostname={{ ansible_facts['hostname'] }} node-role.kubernetes.io/worker=worker --overwrite
  become: true
  when: "'server_nodes' in group_names"
  changed_when: false

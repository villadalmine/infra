# ─────────────────────────────────────────────────────────────────────────────
# OpenClaw — Personal AI Gateway
# https://github.com/openclaw/openclaw
# Image: ghcr.io/openclaw/openclaw (multi-arch, arm64 supported natively)
# ─────────────────────────────────────────────────────────────────────────────

openclaw_version: "latest"
openclaw_namespace: "openclaw"
openclaw_image: "ghcr.io/openclaw/openclaw"
openclaw_hostname: "openclaw.cluster.home"

# ─── Resource limits ──────────────────────────────────────────────────────────
# Schedule on RK1 (32 GB RAM). See AGENTS.md for node table.
openclaw_node_hostname: "srv-rk1-nvme-02"
openclaw_cpu_request: "200m"
openclaw_cpu_limit: "2000m"
openclaw_memory_request: "512Mi"
openclaw_memory_limit: "2Gi"

# ─── Storage ──────────────────────────────────────────────────────────────────
# smb-nas StorageClass (default). Override to local-path for no-NAS testing.
# The storage backend role is auto-installed first (idempotent include_role).
openclaw_storage_size: "10Gi"
openclaw_storage_class: "smb-nas"
openclaw_storage_role: "install-cifs-nas"

# ─── LiteLLM backend (shared in-cluster proxy) ───────────────────────────────
# Uses the shared LiteLLM proxy already in namespace 'ai'.
# All model traffic is tracked in Prometheus and visible in Grafana.
# To bypass LiteLLM and go direct to OpenRouter, set openclaw_llm_backend: "openrouter"
# and provide openclaw_openrouter_api_key in secrets.yml.
openclaw_llm_backend: "litellm"
openclaw_litellm_url: "http://litellm-proxy.ai.svc.cluster.local:4000"
openclaw_litellm_master_key: "sk-hermes-internal"

# OpenClaw virtual model names (resolved by LiteLLM routing):
#   openai/gemini-free  → google/gemma-4-31b-it:free  (primary, OpenClaw adds openai/ prefix)
#   openclaw-gemini     → google/gemma-4-31b-it:free  (same backend, different alias)
#   gemini-free2        → google/gemma-3-27b-it:free  (fallback)
# Use provider-prefixed model IDs to avoid client-side provider fallback.
# Set primary to the OpenRouter model ID exposed via LiteLLM.
# Default to the virtual model name resolved by LiteLLM so the client does not
# include a provider prefix. This helps prevent OpenClaw from triggering the
# provider routing logic that sends traffic to api.openai.com directly.
openclaw_model_primary: "litellm/gpt-4o"
# Fallbacks (optional) — keep as provider-prefixed where sensible.
openclaw_model_fallback1: "openrouter/qwen/qwen3-coder:free"
openclaw_model_fallback2: "openrouter/google/gemini-2.0-flash-exp:free"

# ─── kubernetes-mcp sidecar ──────────────────────────────────────────────────
# Sidecar container that exposes Kubernetes MCP at http://127.0.0.1:8080/mcp.
# Same image used by hermes-agent-mcp. Uses the pod ServiceAccount token (no extra creds).
openclaw_mcp_k8s_image: "registry.registry:5000/ai/kubernetes-mcp-server"
openclaw_mcp_k8s_tag: "v0.0.60"

# ─── Subagent endpoints (for NetworkPolicy + AGENTS.md) ──────────────────────
openclaw_holmes_url: "http://holmesgpt-holmes.ai.svc.cluster.local"
openclaw_kagent_url: "http://k8s-agent.kagent.svc.cluster.local:8080"
openclaw_hermes_url: "http://hermes-agent-mcp.ai.svc.cluster.local:8000"


openclaw_prometheus_url: "http://prometheus-operated.monitoring.svc.cluster.local:9090"

# ─── RBAC — Kubernetes permission level ──────────────────────────────────────
# Controls what ClusterRole/RoleBinding the ServiceAccount gets.
# Override per run: -e "openclaw_rbac_level=operator"
#
#  readonly      → get/list/watch only (safe default)
#  operator      → readonly + exec/logs + create/patch/delete jobs & deployments
#  admin         → namespaced admin (all resources in openclaw namespace)
#  cluster-admin → full cluster access (explicit, use carefully)
openclaw_rbac_level: "readonly"

# ─── Channel: Telegram ───────────────────────────────────────────────────────
# Token loaded from defaults/secrets.yml (gitignored — see secrets.yml.example).
openclaw_telegram_enabled: true
openclaw_telegram_allowed_users: ""   # overridden in secrets.yml
openclaw_telegram_dm_policy: "pairing"  # pairing | open

# ─── Agent sandboxing ─────────────────────────────────────────────────────────
# DinD not supported on K3s without special setup. Keep off.
openclaw_sandbox_enabled: false

# ─── OpenClaw Gateway config ──────────────────────────────────────────────────
openclaw_gateway_bind: "lan"
openclaw_gateway_port: 18789
openclaw_gateway_auth_mode: "token"

# Agent system prompt — injected as agents.defaults.systemPromptOverride in openclaw.json
# This completely defines the agent's identity and instructions.
openclaw_agent_instructions: |
  Eres el agente principal de la homelab de tu usuario. Hablas español.
  El usuario te habla directamente por Telegram. Eres conciso, técnico y directo.

  ## ACCESO AL CLUSTER — USA TOOL CALLS, NO HTTP
  Tienes herramientas (tool calls) para acceder al cluster. NUNCA hagas requests HTTP al cluster.
  NUNCA pidas kubectl, kubeconfig ni nada al usuario — llama a las tools directamente.

  ## MCP "kubernetes" — inspección del cluster (read-only, rápido)
  Úsalo para: listar pods/namespaces/nodos, ver logs, eventos, estado general.
  - `namespaces_list` — todos los namespaces
  - `pods_list_in_namespace` (namespace) — pods de un namespace
  - `pods_get` (name, namespace) — detalle de un pod
  - `pods_log` (name, namespace) — logs de un pod
  - `nodes_top` — CPU/RAM de nodos
  - `resources_list` (apiVersion, kind, namespace?) — cualquier recurso K8s
  - `resources_get` (apiVersion, kind, name, namespace?) — recurso específico
  - `events_list` (namespace?) — eventos del cluster

  ## MCP "kagent" — operaciones avanzadas (kubectl, helm, Cilium, Prometheus)
  Úsalo para: helm, métricas, debugging Cilium, operaciones kubectl complejas.
  Tools clave:
  - `helm_list_releases` (namespace?) — listar Helm releases
  - `helm_get_release` (name, namespace) — detalle de un release
  - `helm_upgrade` (name, chart, namespace, values?) — upgrade/install release
  - `k8s_get_resources` (resource, namespace?) — get recursos con kubectl
  - `k8s_describe_resource` (resource, name, namespace?) — describe
  - `k8s_get_pod_logs` (pod, namespace, container?) — logs
  - `k8s_get_events` (namespace?) — eventos
  - `k8s_apply_manifest` (manifest) — aplicar YAML (solo con aprobación explícita)
  - `k8s_scale` (resource, replicas, namespace) — escalar (solo con aprobación)
  - `k8s_delete_resource` (resource, name, namespace) — borrar (solo con aprobación)
  - `prometheus_query_tool` (query) — ejecutar PromQL
  - `prometheus_query_range_tool` (query, start, end, step) — rango de métricas
  - `prometheus_targets_tool` — estado de targets Prometheus
  - `cilium_status_and_version` — estado de Cilium
  - `cilium_get_endpoints_list` — endpoints Cilium
  - `cilium_validate_cilium_network_policies` — validar NetworkPolicies
  - `shell` (command) — ejecutar shell (solo con aprobación explícita del usuario)

  ## Cuándo usar cada MCP
  - Pregunta sobre pods/logs/estado → kubernetes MCP (más rápido)
  - Helm releases, versiones de charts → kagent `helm_list_releases`
  - Métricas Prometheus → kagent `prometheus_query_tool`
  - Debugging Cilium/red → kagent `cilium_*`
  - Operaciones de escritura (scale, apply, delete) → kagent + pide confirmación

  ## Cluster — K3s ARM64, 10 nodos
  Servers: srv-super6c-01-nvme (.85), -02 (.86), -03 (.87), -05-emmc (.104), -06-emmc (.105)
  Agents: srv-rk1-nvme-01 (.30), srv-rk1-nvme-02 (.48) ← este pod, -03 (.51), -04 (.54)
  Standalone: srv-super6c-04-emmc (.133) — no en K3s
  Gateway: 192.168.178.200 | Pi-hole: 192.168.178.203 | Dominio: *.cluster.home

  ## Namespaces clave
  monitoring (grafana, prometheus, alertmanager), ai (litellm-proxy, holmesgpt-holmes),
  argocd, kagent, openclaw, registry, pihole, kaniko

  ## Reglas
  - NUNCA leas Secrets
  - Operaciones de escritura (apply/delete/scale/shell) solo con confirmación explícita del usuario
  - Nunca pidas kubectl al usuario — tienes acceso directo via tool calls
  - Si el usuario pide info del cluster → llama la tool, no inventes
  - Al final de cada respuesta que use tools, indica exactamente qué MCP y tool usaste.
    Son dos servidores distintos: "kubernetes" (sidecar local) y "kagent" (kagent-tools).
    Ejemplos: "_(vía kubernetes › pods_list_in_namespace)_" o "_(vía kagent › helm_list_releases)_"
    NUNCA digas "kubernetes" si usaste una tool de kagent y viceversa.

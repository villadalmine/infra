# Deploy kagent AI agent platform with kmcp (MCP server lifecycle manager).
# Uses in-cluster LiteLLM proxy as OpenAI-compatible backend.
# Multi-tenancy: controller watches all namespaces; tenants get RoleBindings in their ns.

- name: Ensure custom Storage backend is installed before deploying kagent
  ansible.builtin.include_role:
    name: "{{ kagent_storage_role }}"
  when: kagent_db_storage_class != 'local-path' and kagent_storage_role is defined

- name: Create kagent namespace
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ kagent_namespace }}"
    state: present

- name: Create tenant namespaces with kagent label
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ item }}"
        labels:
          kagent.dev/tenant: "true"
    state: present
  loop: "{{ kagent_tenant_namespaces }}"

# ── Create StorageClass for postgres: smb-nas but with uid=999 ───────────
# The default smb-nas uses uid=1000 but postgres runs as uid=999 and
# requires the data directory to be owned by its own UID.
- name: Create smb-nas-pg StorageClass (uid=999 for postgres)
  kubernetes.core.k8s:
    definition:
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        name: smb-nas-pg
      provisioner: smb.csi.k8s.io
      reclaimPolicy: Retain
      volumeBindingMode: Immediate
      mountOptions:
        - vers=1.0
        - uid=999
        - gid=999
        - file_mode=0700
        - dir_mode=0700
        - noperm
        - mfsymlinks
        - cache=strict
        - noserverino
      parameters:
        csi.storage.k8s.io/node-stage-secret-name: smbcreds
        csi.storage.k8s.io/node-stage-secret-namespace: default
        csi.storage.k8s.io/provisioner-secret-name: smbcreds
        csi.storage.k8s.io/provisioner-secret-namespace: default
        source: "//192.168.178.102/service/Torrent"
    state: present

# ── Step 1: install CRDs chart first (required before main chart) ─────────
- name: Install or upgrade kagent-crds
  kubernetes.core.helm:
    name: "kagent-crds"
    chart_ref: "oci://ghcr.io/kagent-dev/kagent/helm/kagent-crds"
    chart_version: "{{ kagent_chart_version }}"
    release_namespace: "{{ kagent_namespace }}"
    create_namespace: false
    wait: true
    wait_timeout: "120s"
    values: {}

- name: Wait for kagent CRDs to be established
  ansible.builtin.command:
    cmd: >
      kubectl wait --for=condition=Established crd
      agents.kagent.dev
      modelconfigs.kagent.dev
      mcpservers.kagent.dev
      --timeout=60s
  changed_when: false

# ── Step 2: install main chart ────────────────────────────────────────────
- name: Install or upgrade kagent
  kubernetes.core.helm:
    name: "{{ kagent_release_name }}"
    chart_ref: "{{ kagent_chart }}"
    chart_version: "{{ kagent_chart_version }}"
    release_namespace: "{{ kagent_namespace }}"
    create_namespace: false
    wait: false
    values:
      # ── LLM provider: reuse in-cluster LiteLLM proxy ──────────────────────
      providers:
        default: openAI
        openAI:
          provider: OpenAI
          model: "{{ kagent_llm_model }}"
          apiKey: "{{ kagent_llm_api_key }}"
          config:
            baseUrl: "{{ kagent_llm_base_url }}"

      # ── Global tolerations: needed because the control plane node has transient
      # network issues that cause ephemeral unreachable taints on all nodes.
      # Without tolerations, scheduler rejects all nodes as "untolerated taint".
      # No nodeSelector: let K8s distribute pods across all healthy nodes.
      tolerations:
        - operator: Exists

      # ── Controller: watch all namespaces ──────────────────────────────────
      controller:
        watchNamespaces: []
        tolerations:
          - operator: Exists
        agentDeployment:
          serviceAccountName: "kagent-agent-exec"

      # ── UI ────────────────────────────────────────────────────────────────
      ui:
        tolerations:
          - operator: Exists

      # ── Database: bundled PostgreSQL on smb-nas ───────────────────────────
      database:
        postgres:
          bundled:
            storageClassName: "{{ kagent_db_storage_class }}"
            storage: "{{ kagent_db_storage_size }}"

      # ── RBAC: cluster-scoped (controller needs write access to manage agents)
      rbac:
        clusterScoped: true

      # ── kmcp: MCP server lifecycle manager (bundled) ─────────────────────
      kmcp:
        enabled: true
        tolerations:
          - operator: Exists

      # ── Tools subchart ────────────────────────────────────────────────────
      kagent-tools:
        tolerations:
          - operator: Exists

      # ── Built-in agents ───────────────────────────────────────────────────
      agents:
        k8s-agent:
          enabled: "{{ kagent_agents_enabled }}"
        kgateway-agent:
          enabled: "{{ kagent_agents_enabled }}"
        istio-agent:
          enabled: "{{ kagent_agents_enabled }}"
        argo-rollouts-agent:
          enabled: "{{ kagent_agents_enabled }}"
        helm-agent:
          enabled: "{{ kagent_agents_enabled }}"
        cilium-agent:
          enabled: "{{ kagent_agents_enabled }}"
        prometheus-agent:
          enabled: "{{ kagent_agents_enabled }}"

# ── Patch postgres deployment: add tolerations + nodeSelector ────────────
# The bundled postgres template doesn't support global tolerations,
# so we patch it directly after helm install.
# Patch deployments that don't inherit global tolerations (postgres, grafana-mcp, querydoc)
- name: Patch {{ item }} deployment with tolerations (no nodeSelector)
  kubernetes.core.k8s:
    api_version: apps/v1
    kind: Deployment
    name: "{{ item }}"
    namespace: "{{ kagent_namespace }}"
    definition:
      spec:
        template:
          spec:
            tolerations:
              - operator: Exists
    merge_type: strategic-merge
    state: present
  loop:
    - kagent-postgresql
    - kagent-grafana-mcp
    - kagent-querydoc

# ── PostgreSQL: fix pg_hba.conf to allow pod-to-pod connections ──────────
# postgres:18 default pg_hba.conf only allows Unix socket and localhost.
# The kagent controller pod (IP range 10.0.0.0/8 or 10.42.0.0/16) connects
# via TCP, which is rejected with "no pg_hba.conf entry". Fix: append a
# trust rule for all IPs after postgres is ready. Idempotent: grep prevents
# duplicate appends.
- name: Wait for kagent-postgresql to be ready
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/kagent-postgresql -n {{ kagent_namespace }} --timeout=120s
  changed_when: false

- name: Fix kagent-postgresql pg_hba.conf (allow TCP from all pod CIDRs)
  ansible.builtin.command:
    cmd: >
      kubectl exec -n {{ kagent_namespace }} deployment/kagent-postgresql --
      sh -c "
        grep -q '0.0.0.0/0' /var/lib/postgresql/data/pgdata/pg_hba.conf ||
        echo 'host    all    all    0.0.0.0/0    trust' >>
          /var/lib/postgresql/data/pgdata/pg_hba.conf &&
        pg_ctl reload -D /var/lib/postgresql/data/pgdata
      "
  changed_when: false

- name: Create kagent database if not exists
  ansible.builtin.command:
    cmd: >
      kubectl exec -n {{ kagent_namespace }} deployment/kagent-postgresql --
      psql -U kagent -d postgres -tc
      "SELECT 1 FROM pg_database WHERE datname='kagent'"
  register: kagent_db_check
  changed_when: false
  failed_when: false

- name: Create kagent database
  ansible.builtin.command:
    cmd: >
      kubectl exec -n {{ kagent_namespace }} deployment/kagent-postgresql --
      psql -U kagent -d postgres -c "CREATE DATABASE kagent OWNER kagent;"
  when: kagent_db_check.stdout | default('') | trim != '1'
  changed_when: true

# ── Agent ServiceAccount with read + kubectl exec permissions ─────────────
# Agents can: get/list/watch everything + exec into pods + read logs
# Agents CANNOT: create/update/delete K8s resources

- name: Create kagent-agent-exec ServiceAccount
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: kagent-agent-exec
        namespace: "{{ kagent_namespace }}"
    state: present

- name: Create ClusterRole for agent pods (read + exec, no write)
  kubernetes.core.k8s:
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: kagent-agent-exec
      rules:
        # Read-only access to all core resources
        - apiGroups: [""]
          resources: ["*"]
          verbs: ["get", "list", "watch"]
        # kubectl exec and logs
        - apiGroups: [""]
          resources: ["pods/exec", "pods/log"]
          verbs: ["create", "get"]
        # Read-only for apps, batch, networking, etc.
        - apiGroups: ["apps", "batch", "networking.k8s.io", "gateway.networking.k8s.io"]
          resources: ["*"]
          verbs: ["get", "list", "watch"]
        # Read kagent CRDs
        - apiGroups: ["kagent.dev"]
          resources: ["agents", "modelconfigs", "toolservers", "mcpservers", "remotemcpservers", "memories"]
          verbs: ["get", "list", "watch"]
        # Read RBAC (to explain permissions)
        - apiGroups: ["rbac.authorization.k8s.io"]
          resources: ["*"]
          verbs: ["get", "list", "watch"]
    state: present

- name: Bind kagent-agent-exec SA to ClusterRole
  kubernetes.core.k8s:
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: kagent-agent-exec
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: kagent-agent-exec
      subjects:
        - kind: ServiceAccount
          name: kagent-agent-exec
          namespace: "{{ kagent_namespace }}"
    state: present

# ── Tenant RBAC: each tenant namespace can manage its own agents ──────────
# Tenants get writer + getter RoleBindings (namespace-scoped) so they can
# create/edit/delete Agent and MCPServer CRDs in their own namespace only.

- name: Bind tenant namespaces to kagent writer role
  kubernetes.core.k8s:
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: kagent-tenant-writer
        namespace: "{{ item }}"
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: "{{ kagent_release_name }}-writer-role"
      subjects:
        - kind: ServiceAccount
          name: default
          namespace: "{{ item }}"
    state: present
  loop: "{{ kagent_tenant_namespaces }}"

- name: Bind tenant namespaces to kagent getter role
  kubernetes.core.k8s:
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: kagent-tenant-getter
        namespace: "{{ item }}"
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: "{{ kagent_release_name }}-getter-role"
      subjects:
        - kind: ServiceAccount
          name: default
          namespace: "{{ item }}"
    state: present
  loop: "{{ kagent_tenant_namespaces }}"

# ── Wait for core components ───────────────────────────────────────────────

- name: Wait for kagent controller rollout
  ansible.builtin.command:
    cmd: >
      kubectl rollout status deployment/{{ kagent_release_name }}-controller
      -n {{ kagent_namespace }} --timeout=180s
  register: kagent_controller_rollout
  until: kagent_controller_rollout.rc == 0
  retries: 18
  delay: 10
  changed_when: false

- name: Wait for kagent UI rollout
  ansible.builtin.command:
    cmd: >
      kubectl rollout status deployment/{{ kagent_release_name }}-ui
      -n {{ kagent_namespace }} --timeout=180s
  register: kagent_ui_rollout
  until: kagent_ui_rollout.rc == 0
  retries: 18
  delay: 10
  changed_when: false

# ── HTTPRoute: expose UI at kagent.cluster.home ───────────────────────────

# ── Fix kagent-ui nginx upstream: proxy /api/ to controller service ────────
# The kagent-ui image ships with nginx.conf proxying /api/ → 127.0.0.1:8083
# (assumes controller is a sidecar). In our deployment the controller is a
# separate pod at kagent-controller.kagent.svc.cluster.local:8083. Without
# this fix, all /api/ calls from the browser return 502.
- name: Wait for kagent UI rollout before nginx patch
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/{{ kagent_release_name }}-ui -n {{ kagent_namespace }} --timeout=60s
  changed_when: false

- name: Read kagent-ui nginx.conf from running pod
  ansible.builtin.command:
    cmd: kubectl exec -n {{ kagent_namespace }} deployment/{{ kagent_release_name }}-ui -- cat /etc/nginx/nginx.conf
  register: kagent_ui_nginx_conf_raw
  changed_when: false

- name: Patch nginx.conf — route /api/ to controller service (not localhost)
  ansible.builtin.set_fact:
    kagent_ui_nginx_conf_patched: >-
      {{ kagent_ui_nginx_conf_raw.stdout
         | replace('server 127.0.0.1:8083', 'server kagent-controller.' ~ kagent_namespace ~ '.svc.cluster.local:8083')
         | replace('server 127.0.0.1:8081', 'server kagent-controller.' ~ kagent_namespace ~ '.svc.cluster.local:8083') }}

- name: Create kagent-ui-nginx ConfigMap with patched nginx.conf
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: kagent-ui-nginx
        namespace: "{{ kagent_namespace }}"
      data:
        nginx.conf: "{{ kagent_ui_nginx_conf_patched }}"
    state: present

- name: Mount patched nginx.conf in kagent-ui deployment
  kubernetes.core.k8s:
    api_version: apps/v1
    kind: Deployment
    name: "{{ kagent_release_name }}-ui"
    namespace: "{{ kagent_namespace }}"
    definition:
      spec:
        template:
          spec:
            volumes:
              - name: nginx-config
                configMap:
                  name: kagent-ui-nginx
            containers:
              - name: ui
                volumeMounts:
                  - name: nginx-config
                    mountPath: /etc/nginx/nginx.conf
                    subPath: nginx.conf
    merge_type: strategic-merge
    state: present

# ── HTTPRoute: expose UI at kagent.cluster.home ───────────────────────────

- name: Create HTTPRoute for kagent UI
  kubernetes.core.k8s:
    definition:
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: kagent
        namespace: "{{ kagent_namespace }}"
      spec:
        parentRefs:
          - name: cluster-gateway
            namespace: gateway
        hostnames:
          - "{{ kagent_hostname }}"
        rules:
          - backendRefs:
              - name: "{{ kagent_release_name }}-ui"
                port: 8080
    state: present

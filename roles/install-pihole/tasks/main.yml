# Install Pi-hole via Helm as the cluster's DNS resolver.
#
# ── Design ────────────────────────────────────────────────────────────────────
# Pi-hole serves two roles:
#   1. LAN DNS server (set Mac/Linux DNS to .203 — handled separately)
#   2. Wildcard *.cluster.home → .200 so every new service needs zero DNS config
#
# DNS (port 53) gets its own LoadBalancer at .203 — cannot share the HTTP Gateway.
# Web UI (port 80) uses ClusterIP + HTTPRoute → shared Gateway at .200.
#
# ── Wildcard DNS ──────────────────────────────────────────────────────────────
# Uses dnsmasq.customDnsEntries in the chart values — no extra ConfigMap or
# volume mounts needed. The chart renders this into /etc/dnsmasq.d natively.
#
# ── Storage ───────────────────────────────────────────────────────────────────
# Pi-hole persists /etc/pihole via local-path-provisioner PVC.
# Requires K3s without --disable local-storage.
#
# wait:false + kubectl rollout status — see install-cilium/tasks/main.yml for rationale.

- name: Add Pi-hole Helm repository
  kubernetes.core.helm_repository:
    name: mojo2600
    repo_url: https://mojo2600.github.io/pihole-kubernetes/
  changed_when: false

- name: Create pihole namespace
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ pihole_namespace }}"
    state: present

- name: Check if Pi-hole release exists
  ansible.builtin.command:
    cmd: helm list -n {{ pihole_namespace }} -o json --filter pihole
  register: pihole_helm_list
  changed_when: false
  failed_when: false

- name: Set pihole release status fact
  ansible.builtin.set_fact:
    pihole_deployed: "{{ (pihole_helm_list.stdout | from_json | selectattr('status', 'equalto', 'deployed') | list | length) > 0 }}"
  when: pihole_helm_list.stdout | default('') | length > 0

- name: Set pihole release status fact (default not deployed)
  ansible.builtin.set_fact:
    pihole_deployed: false
  when: pihole_helm_list.stdout | default('') | length == 0

- name: Install or upgrade Pi-hole
  kubernetes.core.helm:
    name: pihole
    chart_ref: mojo2600/pihole
    chart_version: "{{ pihole_chart_version }}"
    release_namespace: "{{ pihole_namespace }}"
    create_namespace: false
    wait: false   # deliberately no --wait — see install-cilium for rationale
    values:
      replicaCount: 1

      adminPassword: "{{ pihole_admin_password }}"

      persistentVolumeClaim:
        enabled: true
        storageClass: "{{ pihole_storage_class }}"
        size: "{{ pihole_storage_size }}"

      # DNS Service: own LoadBalancer at .203 (port 53 cannot share the HTTP Gateway)
      # mixedService=true creates a single Service for TCP+UDP — simpler than separate ones.
      # externalTrafficPolicy must be Cluster — L2 Announcements incompatible with Local.
      serviceDns:
        type: LoadBalancer
        mixedService: true
        annotations:
          lbipam.cilium.io/ips: "{{ pihole_dns_ip }}"
          lbipam.cilium.io/sharing-key: "pihole-dns"
        externalTrafficPolicy: Cluster

      # Web UI: ClusterIP — exposed via HTTPRoute on the shared Gateway
      serviceWeb:
        type: ClusterIP
        http:
          enabled: true
          port: 80

      dnsmasq:
        # Wildcard: *.cluster.home and cluster.home itself → shared Gateway IP
        # Plus NeuVector entries for DNS resolution via Pi-hole
        customDnsEntries: "{{ pihole_custom_dns }}"
        # NOTE: do NOT add local-service=false here — Pi-hole 6 FTL injects
        # local-service internally when listeningMode=LOCAL, causing a duplicate
        # keyword CRIT error that prevents DNS from starting. Use the FTLCONF
        # env var below to set listeningMode=ALL instead.

      # Pi-hole 6.x: set listening mode to ALL so FTL binds port 53 on all
      # interfaces and accepts queries from external networks (e.g. Mac at .178.x).
      # listeningMode=LOCAL is the default and maps to dnsmasq's local-service
      # option; setting it via customSettings causes a duplicate keyword crash.
      extraEnvVars:
        - name: FTLCONF_dns_listeningMode
          value: "ALL"

      # Upstream DNS (Pi-hole forwards non-blocked queries here)
      DNS1: "8.8.8.8"
      DNS2: "8.8.4.4"

      # Pi-hole 6.x FTL needs >110s on first boot (loading gravity blocklists).
      # initialDelaySeconds=30 (not 120): on subsequent boots FTL starts in ~15s from PVC,
      # so we'd waste 90s waiting for nothing. failureThreshold=18 × periodSeconds=10 = 180s
      # of failure tolerance after initial delay → total 210s window, enough for first boot.
      probes:
        liveness:
          initialDelaySeconds: 30
          failureThreshold: 18
          periodSeconds: 10
        readiness:
          initialDelaySeconds: 30
          failureThreshold: 18
          periodSeconds: 10
  when: not pihole_deployed

- name: Wait for Pi-hole deployment rollout
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/pihole -n {{ pihole_namespace }} --timeout=180s
  register: pihole_rollout
  until: pihole_rollout.rc == 0
  retries: 18
  delay: 10
  changed_when: false

- name: Create Pi-hole HTTPRoute for web UI
  kubernetes.core.k8s:
    definition:
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: pihole
        namespace: "{{ pihole_namespace }}"
      spec:
        parentRefs:
          - name: cluster-gateway
            namespace: gateway
        hostnames:
          - "{{ pihole_hostname }}"
        rules:
          - backendRefs:
              - name: pihole-web
                port: 80
    state: present

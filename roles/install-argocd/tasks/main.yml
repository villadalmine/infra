# Install ArgoCD via Helm on localhost
# Requires: kubeconfig fetched, Cilium ready, MetalLB ready, Gateway + cert-manager ready
# ArgoCD server exposed via ClusterIP + HTTPRoute → shared Gateway at .200
# URL: https://argocd.cluster.home (TLS terminated at Gateway, cert-manager wildcard cert)
#
# wait:false + kubectl rollout status — see install-cilium/tasks/main.yml for rationale.

- name: Add Argo Helm repository
  kubernetes.core.helm_repository:
    name: argo
    repo_url: https://argoproj.github.io/argo-helm
  changed_when: false

- name: Create ArgoCD namespace
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ argocd_namespace }}"
    state: present

- name: Check if ArgoCD release exists
  kubernetes.core.helm_info:
    name: argocd
    release_namespace: "{{ argocd_namespace }}"
  register: argocd_release_info

- name: Purge stuck ArgoCD release if in failed state
  kubernetes.core.helm:
    name: argocd
    release_namespace: "{{ argocd_namespace }}"
    state: absent
    purge: true
  when:
    - argocd_release_info.status.status is defined
    - argocd_release_info.status.status in ['failed', 'pending-install', 'pending-upgrade', 'pending-rollback']

- name: Install or upgrade ArgoCD
  kubernetes.core.helm:
    name: argocd
    chart_ref: argo/argo-cd
    chart_version: "{{ argocd_version }}"
    release_namespace: "{{ argocd_namespace }}"
    create_namespace: false
    wait: false   # deliberately no --wait — see install-cilium for rationale
    values:
      controller:
        replicas: 1
      server:
        replicas: 1
        service:
          type: ClusterIP   # Exposed via HTTPRoute on shared Gateway
      repoServer:
        replicas: 1
        # ARM64 CM4 needs more time for health checks — repo-server does
        # Redis+GPG+git init on startup and /healthz?full=true takes 2-3s
        livenessProbe:
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      applicationSet:
        replicas: 1
      dex:
        enabled: false
      redis-ha:
        enabled: false
      configs:
        params:
          # Serve plain HTTP internally — TLS terminated at the Gateway
          server.insecure: "true"
  when: >
    argocd_release_info.status.status is not defined or
    argocd_release_info.status.status != 'deployed'

- name: Wait for ArgoCD server rollout
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/argocd-server -n {{ argocd_namespace }} --timeout=180s
  register: argocd_rollout
  until: argocd_rollout.rc == 0
  retries: 18
  delay: 10
  changed_when: false

- name: Create ArgoCD HTTPRoute
  kubernetes.core.k8s:
    definition:
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: argocd
        namespace: "{{ argocd_namespace }}"
      spec:
        parentRefs:
          - name: cluster-gateway
            namespace: gateway
        hostnames:
          - "{{ argocd_hostname }}"
        rules:
          - backendRefs:
              - name: argocd-server
                port: 80
    state: present

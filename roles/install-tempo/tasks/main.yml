# Install Grafana Tempo via Helm on localhost
# Single-binary mode — appropriate for single-node homelab.
# Chart: grafana-community/tempo (NOT grafana/tempo which is deprecated)
# Repo: https://grafana-community.github.io/helm-charts
#
# IMPORTANT: Use chart >= 1.26.x — v2.0.0 has a template bug that generates
# overrides.defaults:{} which Tempo 2.10.x rejects (field not found in legacyConfig).
#
# metricsGenerator: generates RED metrics from traces → remote_write to Prometheus.
# Processors: service-graphs, span-metrics (enabled via overrides.defaults).

- name: Ensure custom Storage backend is installed before deploying Tempo
  ansible.builtin.include_role:
    name: "{{ tempo_storage_role }}"
  when: tempo_storage_class != 'local-path' and tempo_storage_role is defined

- name: Add grafana-community Helm repository
  kubernetes.core.helm_repository:
    name: grafana-community
    repo_url: https://grafana-community.github.io/helm-charts
  changed_when: false

- name: Check if Tempo release exists
  ansible.builtin.command:
    cmd: helm list -n {{ tempo_namespace }} -o json --filter tempo
  register: tempo_helm_list
  changed_when: false
  failed_when: false

- name: Set tempo release status fact
  ansible.builtin.set_fact:
    tempo_deployed: "{{ (tempo_helm_list.stdout | from_json | selectattr('status', 'equalto', 'deployed') | list | length) > 0 }}"
  when: tempo_helm_list.stdout | default('') | length > 0

- name: Set tempo release status fact (default not deployed)
  ansible.builtin.set_fact:
    tempo_deployed: false
  when: tempo_helm_list.stdout | default('') | length == 0

- name: Install or upgrade Tempo
  kubernetes.core.helm:
    name: tempo
    chart_ref: grafana-community/tempo
    chart_version: "{{ tempo_version }}"
    release_namespace: "{{ tempo_namespace }}"
    create_namespace: false
    wait: false
    values:
      replicas: 1

      tempo:
        reportingEnabled: false
        retention: "{{ tempo_retention }}"

        metricsGenerator:
          enabled: true
          remoteWriteUrl: "http://kube-prometheus-stack-prometheus.{{ tempo_namespace }}:9090/api/v1/write"
          processor:
            service_graphs:
              wait: 10s
              max_items: 10000
            span_metrics:
              enable_target_info: true

        overrides:
          defaults:
            metrics_generator:
              processors:
                - service-graphs
                - span-metrics
                - local-blocks

      persistence:
        enabled: true
        storageClassName: "{{ tempo_storage_class }}"
        size: "{{ tempo_storage_size }}"
  when: not tempo_deployed

- name: Wait for Tempo rollout
  ansible.builtin.command:
    cmd: kubectl rollout status statefulset/tempo -n {{ tempo_namespace }} --timeout=180s
  register: tempo_rollout
  until: tempo_rollout.rc == 0
  retries: 18
  delay: 10
  changed_when: false

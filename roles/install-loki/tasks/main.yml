# Install Grafana Loki via Helm on localhost
# SingleBinary mode with MinIO for object storage
# wait:false + kubectl rollout status — avoids Helm timeout on ARM64 slow pulls.

- name: Add Grafana Helm repository
  kubernetes.core.helm_repository:
    name: grafana
    repo_url: https://grafana.github.io/helm-charts
  changed_when: false

- name: Create monitoring namespace
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ loki_namespace }}"
    state: present

- name: Check if Loki release exists
  ansible.builtin.command:
    cmd: helm list -n {{ loki_namespace }} -o json --filter loki
  register: loki_helm_list
  changed_when: false
  failed_when: false

- name: Set loki release status fact
  ansible.builtin.set_fact:
    loki_deployed: "{{ (loki_helm_list.stdout | from_json | selectattr('status', 'equalto', 'deployed') | list | length) > 0 }}"
  when: loki_helm_list.stdout | default('') | length > 0

- name: Set loki release status fact (default not deployed)
  ansible.builtin.set_fact:
    loki_deployed: false
  when: loki_helm_list.stdout | default('') | length == 0

- name: Read Loki PVCs
  kubernetes.core.k8s_info:
    api_version: v1
    kind: PersistentVolumeClaim
    namespace: "{{ loki_namespace }}"
    label_selectors:
      - release=loki
  register: loki_pvcs
  changed_when: false
  failed_when: false

- name: Detect Loki storage migration need
  ansible.builtin.set_fact:
    loki_storage_migration_needed: >-
      {{ (loki_pvcs.resources | default([])
      | selectattr('spec.storageClassName', 'defined')
      | selectattr('spec.storageClassName', 'ne', loki_storage_class)
      | list | length) > 0 }}

- name: Purge Loki release before storage migration
  kubernetes.core.helm:
    name: loki
    release_namespace: "{{ loki_namespace }}"
    state: absent
    purge: true
  when: loki_storage_migration_needed | default(false)

- name: Wait for Loki PVCs to disappear after purge
  kubernetes.core.k8s_info:
    api_version: v1
    kind: PersistentVolumeClaim
    namespace: "{{ loki_namespace }}"
    label_selectors:
      - release=loki
  register: loki_pvcs_after_purge
  until: loki_pvcs_after_purge.resources | default([]) | length == 0
  retries: 30
  delay: 10
  changed_when: false
  when: loki_storage_migration_needed | default(false)

- name: Install or upgrade Loki
  kubernetes.core.helm:
    name: loki
    chart_ref: grafana/loki
    chart_version: "{{ loki_version }}"
    release_namespace: "{{ loki_namespace }}"
    create_namespace: false
    wait: false
    values:
      deploymentMode: "{{ loki_deployment_mode }}"

      loki:
        commonConfig:
          replication_factor: 1
        schemaConfig:
          configs:
            - from: "2024-04-01"
              store: tsdb
              object_store: s3
              schema: v13
              index:
                prefix: loki_index_
                period: 24h
        pattern_ingester:
          enabled: true
        limits_config:
          allow_structured_metadata: true
          volume_enabled: true
        ruler:
          enable_api: true

      minio:
        enabled: "{{ loki_minio_enabled }}"
        persistence:
          storageClass: "{{ loki_storage_class }}"
          size: "{{ loki_minio_persistence_size }}"

      singleBinary:
        replicas: "{{ loki_replicas }}"
        persistence:
          storageClass: "{{ loki_storage_class }}"
          size: "{{ loki_storage_size }}"

      backend:
        replicas: 0
      read:
        replicas: 0
      write:
        replicas: 0
      ingester:
        replicas: 0
      querier:
        replicas: 0
      queryFrontend:
        replicas: 0
      queryScheduler:
        replicas: 0
      distributor:
        replicas: 0
      compactor:
        replicas: 0
      indexGateway:
        replicas: 0
      bloomCompactor:
        replicas: 0
      bloomGateway:
        replicas: 0

      # Caches disabled — CM4 has limited memory (8GB shared across all pods)
      chunksCache:
        enabled: "{{ loki_chunks_cache_enabled }}"
      resultsCache:
        enabled: "{{ loki_results_cache_enabled }}"
- name: Wait for Loki rollout
  ansible.builtin.command:
    cmd: kubectl rollout status statefulset/loki -n {{ loki_namespace }} --timeout=180s
  register: loki_rollout
  until: loki_rollout.rc == 0
  retries: 18
  delay: 10
  changed_when: false

- name: Wait for Loki gateway rollout
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/loki-gateway -n {{ loki_namespace }} --timeout=180s
  register: loki_gateway_rollout
  until: loki_gateway_rollout.rc == 0
  retries: 18
  delay: 10
  changed_when: false
  failed_when: false  # gateway may not exist in some configurations

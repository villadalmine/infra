# Install Grafana Loki via Helm on localhost
# SingleBinary mode with MinIO for object storage
# wait:false + kubectl rollout status — avoids Helm timeout on ARM64 slow pulls.

- name: Add Grafana Helm repository
  kubernetes.core.helm_repository:
    name: grafana
    repo_url: https://grafana.github.io/helm-charts
  changed_when: false

- name: Create monitoring namespace
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ loki_namespace }}"
    state: present

- name: Check if Loki release exists
  kubernetes.core.helm_info:
    name: loki
    release_namespace: "{{ loki_namespace }}"
  register: loki_release_info

- name: Purge stuck Loki release if in failed state
  kubernetes.core.helm:
    name: loki
    release_namespace: "{{ loki_namespace }}"
    state: absent
    purge: true
  when:
    - loki_release_info.status.status is defined
    - loki_release_info.status.status in ['failed', 'pending-install', 'pending-upgrade', 'pending-rollback']

- name: Install or upgrade Loki
  kubernetes.core.helm:
    name: loki
    chart_ref: grafana/loki
    chart_version: "{{ loki_version }}"
    release_namespace: "{{ loki_namespace }}"
    create_namespace: false
    wait: false
    values:
      deploymentMode: "{{ loki_deployment_mode }}"

      loki:
        commonConfig:
          replication_factor: 1
        schemaConfig:
          configs:
            - from: "2024-04-01"
              store: tsdb
              object_store: s3
              schema: v13
              index:
                prefix: loki_index_
                period: 24h
        pattern_ingester:
          enabled: true
        limits_config:
          allow_structured_metadata: true
          volume_enabled: true
        ruler:
          enable_api: true

      minio:
        enabled: "{{ loki_minio_enabled }}"
        persistence:
          size: "{{ loki_minio_persistence_size }}"

      singleBinary:
        replicas: "{{ loki_replicas }}"

      backend:
        replicas: 0
      read:
        replicas: 0
      write:
        replicas: 0
      ingester:
        replicas: 0
      querier:
        replicas: 0
      queryFrontend:
        replicas: 0
      queryScheduler:
        replicas: 0
      distributor:
        replicas: 0
      compactor:
        replicas: 0
      indexGateway:
        replicas: 0
      bloomCompactor:
        replicas: 0
      bloomGateway:
        replicas: 0
  when: >
    loki_release_info.status.status is not defined or
    loki_release_info.status.status != 'deployed'

- name: Wait for Loki rollout
  ansible.builtin.command:
    cmd: kubectl rollout status statefulset/loki -n {{ loki_namespace }} --timeout=180s
  register: loki_rollout
  until: loki_rollout.rc == 0
  retries: 18
  delay: 10
  changed_when: false

- name: Wait for Loki gateway rollout
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/loki-gateway -n {{ loki_namespace }} --timeout=180s
  register: loki_gateway_rollout
  until: loki_gateway_rollout.rc == 0
  retries: 18
  delay: 10
  changed_when: false
  failed_when: false  # gateway may not exist in some configurations

# .mise.toml — workstation tool versions for infra-ai/infra
#
# Install mise: curl https://mise.run | sh
# Then run:     mise install
#
# mise detects your OS and CPU architecture automatically.
# Tools are installed to ~/.local/share/mise/ — no system-wide changes.

[tools]
# Python — for Ansible, LiteLLM, kubernetes module
python = "3.13"

# Node — for OpenCode (optional AI tool)
node = "22"

# kubectl — must be within 1 minor version of your K3s server
# K3s v1.35.x → kubectl 1.35.x
"aqua:kubernetes/kubectl" = "1.35.2"

# Helm — K8s package manager
"aqua:helm/helm" = "3.17.3"

# nova — check for outdated Helm releases
"aqua:FairwindsOps/nova" = "latest"

# OpenCode — AI coding assistant (uses local LiteLLM proxy)
"npm:opencode-ai" = "latest"

# jq — JSON query tool (used to inspect survey output)
"aqua:jqlang/jq" = "latest"

# k9s — interactive Kubernetes TUI (pods, logs, exec, port-forward)
"aqua:derailed/k9s" = "latest"

[env]
# Use a virtualenv inside the repo for Python packages
# mise creates it automatically at .venv/
_.python.venv = { path = ".venv", create = true }

[tasks.setup]
description = "Install all workstation dependencies (run once after mise install)"
run = """
#!/usr/bin/env bash
set -euo pipefail
echo "==> Installing Python packages..."
pip install -r setup/requirements.txt
echo ""
echo "==> Installing Ansible collections..."
ansible-galaxy collection install -r setup/requirements.yml
echo ""
echo "==> Done. Tools installed:"
echo "    ansible      $(ansible --version 2>/dev/null | head -1)"
echo "    kubectl      $(kubectl version --client --short 2>/dev/null || kubectl version --client 2>/dev/null | head -1)"
echo "    helm         $(helm version --short 2>/dev/null)"
echo "    k9s          $(k9s version --short 2>/dev/null | head -1 || echo 'installed via mise')"
echo "    jq           $(jq --version 2>/dev/null)"
echo "    opencode     $(opencode --version 2>/dev/null || echo 'installed via mise npm')"
echo "    litellm      $(litellm --version 2>/dev/null)"
echo "    holmes       $(holmes --version 2>/dev/null || echo 'installed via pip (holmesgpt)')"
echo "    hermes       $(hermes --version 2>/dev/null || echo 'installed via pip (hermes-agent)')"
echo ""
echo "Next steps:"
echo "  1. cp inventory/hosts.ini.example inventory/hosts.ini"
echo "  2. Edit inventory/hosts.ini with your node IPs"
echo "  3. make setup-nodes"
echo "  4. make survey"
"""

[tasks.litellm]
description = "Start local LiteLLM proxy (uses setup/litellm/config.yaml)"
run = """
#!/usr/bin/env bash
litellm --config setup/litellm/config.yaml --port 4000
"""

# .mise.toml — workstation tool versions for infra-ai/infra
#
# Install mise: curl https://mise.run | sh
# Then run:     mise install
#
# mise detects your OS and CPU architecture automatically.
# Tools are installed to ~/.local/share/mise/ — no system-wide changes.

[tools]
# Python — for Ansible, LiteLLM, kubernetes module
python = "3.13"

# Node — for OpenCode (optional AI tool)
node = "22"

# kubectl — must be within 1 minor version of your K3s server
# K3s v1.35.x → kubectl 1.35.x
"aqua:kubernetes/kubectl" = "1.35.2"

# Helm — K8s package manager
"aqua:helm/helm" = "3.17.3"

# nova — check for outdated Helm releases
"aqua:FairwindsOps/nova" = "latest"

# OpenCode — AI coding assistant (uses local LiteLLM proxy)
"npm:opencode-ai" = "latest"

# jq — JSON query tool (used to inspect survey output)
"aqua:jqlang/jq" = "latest"

# k9s — interactive Kubernetes TUI (pods, logs, exec, port-forward)
"aqua:derailed/k9s" = "latest"

[env]
# Use a virtualenv inside the repo for Python packages
# mise creates it automatically at .venv/
_.python.venv = { path = ".venv", create = true }

[tasks.setup-core]
description = "Install mandatory deps — ansible, kubernetes module, ansible collections"
run = """
#!/usr/bin/env bash
set -euo pipefail
echo "==> [core] Installing Python packages..."
pip install -r setup/requirements-core.txt
echo ""
echo "==> [core] Installing Ansible collections..."
ansible-galaxy collection install -r setup/requirements.yml
echo ""
echo "==> core done:"
echo "    ansible   $(ansible --version 2>/dev/null | head -1)"
echo "    kubectl   $(kubectl version --client 2>/dev/null | head -1)"
echo "    helm      $(helm version --short 2>/dev/null)"
echo "    jq        $(jq --version 2>/dev/null)"
echo ""
echo "Next steps:"
echo "  make deps-ai    add AI tools (litellm, fastmcp, opencode)"
echo "  make deps-ops   add ops tools (k9s, nova, ansible-lint)"
echo "  make deps-full  install everything at once"
"""

[tasks.setup-ai]
description = "Install AI tools — litellm, fastmcp, pyyaml (+ node/opencode via mise)"
run = """
#!/usr/bin/env bash
set -euo pipefail
echo "==> [ai] Installing Python packages..."
pip install -r setup/requirements-ai.txt
echo ""
echo "==> ai done:"
echo "    litellm   $(litellm --version 2>/dev/null)"
echo "    opencode  $(opencode --version 2>/dev/null || echo 'installed via mise npm')"
echo ""
echo "Optional AI CLIs (separate install — not included):"
echo "    make holmesgpt-install   https://docs.holmesgpt.com/getting-started"
echo "    make hermes-install      https://hermes-agent.nousresearch.com/docs/getting-started/installation"
"""

[tasks.setup-ops]
description = "Install ops tools — ansible-lint (+ k9s/nova via mise)"
run = """
#!/usr/bin/env bash
set -euo pipefail
echo "==> [ops] Installing Python packages..."
pip install -r setup/requirements-ops.txt
echo ""
echo "==> ops done:"
echo "    ansible-lint  $(ansible-lint --version 2>/dev/null | head -1)"
echo "    k9s           $(k9s version --short 2>/dev/null | head -1 || echo 'installed via mise')"
echo "    nova          $(nova --version 2>/dev/null | head -1 || echo 'installed via mise')"
"""

[tasks.setup]
description = "Install ALL workstation deps — core + ai + ops (same as make deps-full)"
run = """
#!/usr/bin/env bash
set -euo pipefail
mise run setup-core
echo ""
mise run setup-ai
echo ""
mise run setup-ops
echo ""
echo "==> All done. Run 'make help' to see available targets."
"""

[tasks.install-holmesgpt]
description = "Install HolmesGPT CLI locally — holmes ask 'why is pod X crashing?' (optional)"
run = """
#!/usr/bin/env bash
set -euo pipefail
echo "Installing HolmesGPT CLI (may take a few minutes — heavy deps)..."
echo "Docs: https://docs.holmesgpt.com/getting-started"
pip install holmesgpt
echo ""
echo "Done. Run: holmes ask 'why is pod X crashing?'"
echo "     Needs: kubectl access to the cluster"
"""

[tasks.install-hermes]
description = "Install Hermes Agent CLI locally — hermes chat -q '...' (optional)"
run = """
#!/usr/bin/env bash
set -euo pipefail
echo "Installing Hermes Agent CLI..."
echo "Docs: https://hermes-agent.nousresearch.com/docs/getting-started/installation"
curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash
echo ""
echo "Done. Run: hermes model   (select LLM provider)"
echo "      Run: hermes chat -q 'your question'"
"""

[tasks.litellm]
description = "Start local LiteLLM proxy (uses setup/litellm/config.yaml)"
run = """
#!/usr/bin/env bash
litellm --config setup/litellm/config.yaml --port 4000
"""

# Installs the cluster as well as core system components like Cilium, ArgoCD, etc.
# After which, handover.yml is used to delegate the management of these components to ArgoCD
#
# Role order is CRITICAL — see AGENTS.md for full explanation.
# Summary: CRDs before Cilium, Cilium before cilium-pools (LB-IPAM CRDs only exist after Cilium),
#          cert-manager before gateway (wildcard TLS cert must exist),
#          gateway before pihole (HTTPRoute needs gateway to exist).

- name: Create partitions and install K3s
  hosts: all
  become: true
  roles:
    #    - create-partition
    - install-k3s

- name: Get kubeconfig from server and install core components
  hosts: localhost
  gather_facts: true
  roles:
    - get-kubeconfig
    - install-gateway-api-crds
    - install-cilium
    - install-cilium-pools
    - install-cert-manager
    - install-gateway
    - install-pihole
    - install-argocd
    - install-kube-prometheus-stack
    - install-tempo
    - install-alloy

# Installs the cluster as well as core system components like Cilium, ArgoCD, etc.
# After which, handover.yml is used to delegate the management of these components to ArgoCD
#
# Role order is CRITICAL — see AGENTS.md for full explanation.
# Summary: CRDs before Cilium, Cilium before cilium-pools (LB-IPAM CRDs only exist after Cilium),
#          cert-manager before gateway (wildcard TLS cert must exist),
#          gateway before pihole (HTTPRoute needs gateway to exist).
#
# Tags (cumulative — include all tags up to the layer you need):
#   core               → k3s + kubeconfig + node sysctls
#   networking         → gateway-api-crds + cilium + cilium-pools  (requires core)
#   encryption         → cilium wireguard encryption               (requires networking)
#   networking-observability → cilium-hubble-monitoring ServiceMonitor (requires networking + observability)
#   ingress            → cert-manager + gateway                    (requires networking)
#   dns-metrics        → pihole                                    (requires ingress + storage for Pi-hole)
#   services           → argocd + helm-dashboard                   (requires ingress)
#   observability      → prometheus + tempo + loki + alloy         (requires networking + storage for Prometheus/Loki)
#   storage            → storage backends / PVC backends             (requires networking)
#   ai                 → registry + hermes-image + litellm-proxy + hermes-agent  (requires services + storage)
#   openclaw           → OpenClaw personal AI gateway (Telegram + LiteLLM + modular RBAC)
#   ai-registry        → registry only (requires storage)
#   security           → neuvector                                   (requires networking + storage)
#   ai-hermes-build    → kaniko ARM64 image build only
#   ai-hermes-deploy   → LiteLLM proxy + Hermes Agent deploy
#   ai-hermes-agent    → Hermes Agent only
#   ai-holmes          → HolmesGPT HTTP API + Gateway route
#   kagent             → kagent + kmcp operator (multi-tenant AI agent platform)
#   ai-platform        → alias for kagent
#
# Examples:
#   ansible-playbook bootstrap.yml --tags core
#   ansible-playbook bootstrap.yml --tags core,networking
#   ansible-playbook bootstrap.yml --tags core,networking,ingress,services

- name: Create partitions and install K3s
  hosts: k3s_nodes
  become: true
  roles:
    #    - create-partition
    - role: install-k3s
      tags: [core]

- name: Get kubeconfig from server and install core components
  hosts: localhost
  gather_facts: true
  environment:
    PATH: "{{ lookup('env','HOME') }}/.asdf/shims:{{ lookup('env','HOME') }}/.asdf/bin:{{ lookup('env','PATH') }}"
  roles:
    - role: get-kubeconfig
      tags: [core]
    - role: install-gateway-api-crds
      tags: [networking]
    - role: install-cilium
      tags: [networking]
    - role: install-cilium-pools
      tags: [networking]
    - role: install-cilium-encryption
      tags: [encryption]
    - role: install-cilium-hubble-monitoring
      tags: [networking-observability]
    - role: install-cert-manager
      tags: [ingress]
    - role: install-gateway
      tags: [ingress]
    - role: install-pihole
      tags: [dns-metrics]
    - role: install-argocd
      tags: [services]
    - role: install-helm-dashboard
      tags: [services]
    - role: install-kube-prometheus-stack
      tags: [observability]
    - role: install-tempo
      tags: [observability]
    - role: install-loki
      tags: [observability]
    - role: install-alloy
      tags: [observability]

    # AI stack (ARM64 build required)
    - role: install-cifs-nas
      tags: [ai, ai-registry]
    - role: install-registry
      tags: [ai, ai-registry]
    - role: install-hermes-agent-image
      tags: [ai, ai-hermes-build]
    - role: install-kubernetes-mcp-server-image
      tags: [ai, ai-kubernetes-mcp-build]
    - role: install-litellm-proxy
      tags: [ai, ai-hermes-deploy]
    - role: install-hermes-agent
      tags: [ai, ai-hermes-deploy, ai-hermes-agent]
    - role: install-holmes
      tags: [ai, ai-holmes]
    - role: install-holmes-ui
      tags: [ai, ai-holmes, ai-holmes-ui]
    - role: install-kagent
      tags: [kagent, ai-platform]
    - role: install-openclaw
      tags: [openclaw]

# Cluster stacks — modular behavioral profiles
#
# Philosophy:
#   - Each stack does ONE thing well, based on a specific behavior/purpose
#   - Stacks are modular and combinable — pick what you need
#   - K3s is the only supported runtime; Cilium is the only CNI
#   - Compute budget is calculated from actual role resource limits
#
# Stack kinds:
#   quick       — minimal working cluster, DIY from here (no Cilium customization beyond defaults)
#   foundation  — opinionated always-on base (non-negotiable for full stack)
#   additive    — small building blocks (dns, ingress, gitops, storage tiers)
#   behavioral  — purpose-specific workloads (observability, ai, security)
#
# Storage tiers (additive, ordered):
#   storage-local  — K3s built-in local-path (always available, no setup, hostPath)
#   storage-nas    — SMB/CIFS CSI driver (NAS-backed PVCs, required before observability/ai)
#   storage-dist   — Distributed block storage (Longhorn/OpenEBS — not yet implemented)
#
# ram_mb: estimated real memory usage (not just requests — includes overhead)
# min_nodes: minimum nodes for this stack (1 = single-node ok)
# min_ram_gb_server: minimum RAM on the server/CP node

stacks:

  # ── Quick cluster (DIY mode — minimal, no opinions beyond K3s + Cilium) ───────

  quick:
    kind: quick
    behavior: "Minimum viable K3s cluster — Cilium CNI running, kubectl works, nothing else. DIY from here."
    roles:
      - install-k3s
      - get-kubeconfig
      - install-gateway-api-crds
      - install-cilium
      - install-cilium-pools
    make: "make core && make networking"
    ram_mb: 1280          # K3s: ~768MB + Cilium: ~512MB
    min_nodes: 1
    min_ram_gb_server: 2
    requires: []
    storage_available:
      - name: local-path
        class: local-path
        note: "K3s built-in — always available. hostPath-backed PVCs. No setup."
    what_you_get:
      - "Working K8s cluster with kubectl"
      - "Cilium CNI — pod networking, ClusterIP, NodePort"
      - "LB-IPAM — LoadBalancer services get real IPs on your LAN"
      - "K3s local-path StorageClass — PVCs work out of the box"
      - "CoreDNS — in-cluster DNS"
      - "Nothing else — no ingress, no DNS, no TLS, no storage CSI"
    notes:
      - "IMPORTANT: make core alone leaves cluster broken (--flannel-backend=none, no CNI)"
      - "Minimum viable = make core && make networking — both required"
      - "Traefik and metrics-server are DISABLED in this repo — add manually if needed"
      - "local-path StorageClass is available — PVCs backed by node hostPath"
      - "Upgrade path: add stacks one at a time (make ingress, make dns, etc.)"
      - "No automation, no GitOps, no monitoring — fully DIY from this point"

  # ── Foundation (always required for full opinionated stack) ──────────────────

  core:
    kind: foundation
    always_required: true
    behavior: "K3s cluster bootstrap — API server, scheduler, kubelet, containerd"
    roles:
      - install-k3s
      - get-kubeconfig
    make: "make core"
    ram_mb: 768           # K3s server: ~512MB; agent: ~256MB
    min_nodes: 1
    min_ram_gb_server: 2
    requires: []
    notes:
      - "K3s runs on any Linux with cgroups v2 — ARM64, x86, RISC-V"
      - "Self-contained: includes containerd, flannel-stub, CoreDNS, local-path"
      - "Base for every other stack — always deploy first"

  networking:
    kind: foundation
    always_required: true
    behavior: "Layer 3/4 networking — Cilium CNI, eBPF, LB-IPAM, L2 announcement, Gateway API CRDs"
    roles:
      - install-gateway-api-crds
      - install-cilium
      - install-cilium-pools
    make: "make networking"
    ram_mb: 512           # cilium-agent DaemonSet: ~200MB/node; operator: ~100MB
    min_nodes: 1
    min_ram_gb_server: 2
    requires: [core]
    notes:
      - "Always Cilium — no alternative CNI supported in this repo"
      - "Provides: ClusterIP routing, LB-IPAM (L2), NodePort, eBPF kube-proxy replacement"
      - "Gateway API CRDs enable HTTPRoute pattern for all HTTP services"

  # ── Additive building blocks ──────────────────────────────────────────────────

  ingress:
    kind: additive
    behavior: "TLS termination + HTTP routing — cert-manager (internal CA, wildcard TLS) + shared Gateway resource"
    roles:
      - install-cert-manager
      - install-gateway
    make: "make ingress"
    ram_mb: 256           # cert-manager: ~192MB; gateway controller: integrated into Cilium
    min_nodes: 1
    min_ram_gb_server: 2
    requires: [networking]
    notes:
      - "Enables HTTPS for all services via wildcard cert (*.cluster.home)"
      - "Single shared Gateway in namespace 'gateway' — all services use HTTPRoute"
      - "Pattern: ClusterIP + HTTPRoute → never LoadBalancer for HTTP"

  dns:
    kind: additive
    behavior: "Wildcard DNS — Pi-hole resolves *.cluster.home → gateway IP for all cluster services"
    roles:
      - install-pihole
    make: "make dns"
    ram_mb: 256           # Pi-hole FTL + web UI: ~200MB
    min_nodes: 1
    min_ram_gb_server: 2
    requires: [ingress]
    notes:
      - "CRITICAL: uses local-path storage — SQLite is incompatible with SMB/CIFS"
      - "Wildcard DNS entry: *.cluster.home → 192.168.178.200 (gateway IP)"
      - "Pi-hole 6.x: FTL takes 110s on first boot (normal)"

  gitops:
    kind: additive
    behavior: "GitOps continuous deployment — ArgoCD syncs K8s manifests from Git"
    roles:
      - install-argocd
    make: "make gitops"
    ram_mb: 512           # ArgoCD server + repo-server + dex: ~500MB
    min_nodes: 1
    min_ram_gb_server: 4
    requires: [ingress]
    notes:
      - "Exposed at argocd.cluster.home via HTTPRoute"
      - "Admin password auto-generated on first install"

  # ── Storage tiers (additive, ordered: local → nas → distributed) ─────────────
  #
  # Storage in K3s has 3 tiers. Each tier is a superset of the previous.
  # Rules:
  #   - storage-local is ALWAYS available (K3s built-in, zero config)
  #   - storage-nas MUST be deployed before observability, ai, security, registry
  #   - Some roles have FORCED storage classes — cannot be overridden:
  #       Pi-hole → FORCED local-path  (SQLite incompatible with SMB/CIFS locks)
  #   - All other roles default to smb-nas but can fall back to local-path
  #       if no NAS available (set <role>_storage_class: local-path)

  storage-local:
    kind: additive
    behavior: "K3s built-in local-path — always available without any setup. hostPath-backed PVCs per node."
    roles: []           # built-in — no role to install
    make: "# No make target — local-path is always available after make core"
    ram_mb: 0
    min_nodes: 1
    min_ram_gb_server: 1
    requires: [core]
    storage_class: local-path
    provisioner: rancher.io/local-path
    limitations:
      - "Not HA — PVC is tied to the node that created it (pod must reschedule to same node)"
      - "No shared access — one pod per PVC (ReadWriteOnce only)"
      - "No snapshots, no resize"
      - "Data lost if node is wiped"
    best_for:
      - "Pi-hole (FORCED — SQLite incompatible with SMB CIFS file locking)"
      - "Development workloads where persistence doesn't matter"
      - "Single-node clusters without NAS"
      - "Any role when NAS is unavailable"
    roles_using_local_path:
      - name: install-pihole
        forced: true
        reason: "SQLite FTL database uses file locking — SMB/CIFS locks cause corruption"
    notes:
      - "Default StorageClass in K3s — used if no storageClassName specified"
      - "Path: /var/lib/rancher/k3s/storage/ on the scheduled node"
      - "To override a role to local-path: set <role>_storage_class: local-path in defaults"

  storage-nas:
    kind: additive
    behavior: "SMB/CIFS CSI driver — NAS-backed PVCs. Shared storage accessible from all nodes. Required before observability, ai, security."
    roles:
      - install-cifs-nas
    make: "make storage"
    ram_mb: 128           # csi-smb DaemonSet: ~64MB/node
    min_nodes: 1
    min_ram_gb_server: 2
    requires: [networking]
    storage_class: smb-nas
    provisioner: smb.csi.k8s.io
    nas_ip: "192.168.178.102"
    nas_share: "//192.168.178.102/service"
    secondary_class: smb-nas-pg   # separate share for PostgreSQL (different CIFS options)
    limitations:
      - "Requires NAS reachable on network (port 445)"
      - "CIFS file locking — incompatible with SQLite (Pi-hole), some databases"
      - "Network latency — not suitable for etcd or high-IOPS workloads"
      - "NAS must be up for pods with smb-nas PVCs to start"
    best_for:
      - "Prometheus TSDB (high write throughput, sequential)"
      - "Loki chunks and index (append-only)"
      - "Docker registry storage (large blobs)"
      - "Hermes agent state (JSON files)"
      - "General persistence where HA matters more than IOPS"
    roles_using_smb_nas:
      - install-kube-prometheus-stack
      - install-loki
      - install-tempo
      - install-registry
      - install-hermes-agent
      - install-hermes-agent-image
      - install-neuvector
      - install-kagent          # smb-nas-pg share for PostgreSQL
    roles_using_local_path:
      - name: install-pihole
        forced: true
        reason: "SQLite file locking incompatible with CIFS"
    fallback_to_local_path:
      - "If NAS unavailable: set <role>_storage_class: local-path in each role's defaults"
      - "Example: kps_storage_class: local-path  (loses Prometheus data on pod restart)"
    notes:
      - "MUST run before: observability, ai, security, registry"
      - "NAS LG N2R1 at 192.168.178.102 — Wake-on-LAN supported"
      - "Two storage classes: smb-nas (general) + smb-nas-pg (PostgreSQL-tuned CIFS options)"
      - "Dynamic provisioning: subdirectory per PVC under the configured share"

  storage-distributed:
    kind: additive
    behavior: "Distributed block storage — HA PVCs replicated across nodes. No NAS dependency."
    roles: []           # not yet implemented
    make: "# Not yet implemented — placeholder for Longhorn or OpenEBS"
    status: planned
    ram_mb: 2048        # Longhorn: ~256MB/node manager + ~512MB UI
    min_nodes: 3        # Longhorn requires 3+ nodes for replica quorum
    min_ram_gb_server: 4
    requires: [networking]
    storage_class: longhorn   # or openebs-hostpath
    options:
      - name: Longhorn
        url: "https://longhorn.io"
        notes: "Best UX — web UI, snapshots, backups, S3 support. Make target: future make storage-distributed"
      - name: OpenEBS LocalPV-Hostpath
        url: "https://openebs.io"
        notes: "Simpler than Longhorn, similar to local-path but with better scheduling"
    limitations:
      - "Not yet implemented in this repo — roadmap item"
      - "Longhorn: heavy on RAM (~256MB/node), needs 3+ nodes for HA replicas"
      - "OpenEBS hostpath: no HA (like local-path) but better than local-path for scheduling"
    best_for:
      - "Clusters without NAS — self-contained distributed storage"
      - "HA workloads that can't tolerate NAS downtime"
      - "Learning distributed storage patterns"
    notes:
      - "Until implemented: use smb-nas for HA storage or local-path for ephemeral"
      - "To contribute: add roles/install-longhorn/ and make storage-distributed target"

  # ── Behavioral stacks ─────────────────────────────────────────────────────────

  observability:
    kind: behavioral
    behavior: "Full observability — metrics (Prometheus/Grafana), logs (Loki), traces (Tempo), collection (Alloy)"
    roles:
      - install-kube-prometheus-stack
      - install-tempo
      - install-loki
      - install-alloy
    make: "make observability"
    ram_mb: 8192          # kube-prometheus-stack: ~5GB; Loki: ~1.5GB; Tempo: ~1GB; Alloy: ~256MB
    min_nodes: 2
    min_cluster_ram_gb: 12
    min_ram_gb_server: 4
    requires: [networking]
    what_you_get:
      - "Prometheus scrapes all pods + K8s components every 15s"
      - "Grafana dashboards — K8s overview, node stats, pod CPU/RAM"
      - "AlertManager — fire-and-forget or PagerDuty/Slack alerts"
      - "Loki aggregates all pod logs — query with LogQL"
      - "Tempo collects distributed traces — link logs ↔ traces ↔ metrics"
      - "Alloy (OpenTelemetry collector) — scrapes and forwards all telemetry"
    notes:
      - "SMB NAS recommended for Prometheus/Loki persistence (use make storage first)"
      - "Grafana takes ~2min to start (60s readiness probe — normal)"

  ai:
    kind: behavioral
    behavior: "AI assistant platform — LLM routing, agents, SRE assistant, multi-tenant agent framework"
    roles:
      - install-registry
      - install-hermes-agent-image
      - install-litellm-proxy
      - install-hermes-agent
      - install-holmes
      - install-holmes-ui
      - install-kagent
    make: "make ai && make ai-holmes && make kagent"
    ram_mb: 10240         # litellm: ~3GB; hermes: ~512MB; holmes: ~1GB; kagent: ~1GB; registry: ~256MB; build: transient
    min_nodes: 1
    min_cluster_ram_gb: 24
    min_ram_gb_server: 4
    requires: [networking]
    what_you_get:
      - "LiteLLM proxy — routes to OpenRouter (free/cheap models, fallback chain)"
      - "Hermes Agent — Telegram + web AI assistant"
      - "HolmesGPT — SRE assistant that queries the live cluster and reasons with LLM"
      - "Holmes UI — web chat interface for HolmesGPT"
      - "kagent — multi-tenant AI agent platform with MCP servers"
      - "Docker registry — stores ARM64 custom images built in-cluster"
    notes:
      - "No GPU needed — routes all inference via OpenRouter API"
      - "Cost: $0–$5/month (free tier available on OpenRouter)"
      - "Hermes build takes ~60min (kaniko ARM64 build on first deploy)"
      - "Requires OPENROUTER_API_KEY in roles/install-litellm-proxy/defaults/secrets.yml"
      - "RK1 nodes (31GB) ideal for AI workloads — memory-bound, not compute-bound"

  security:
    kind: behavioral
    behavior: "Container runtime security — policy enforcement, vulnerability scanning, zero-trust network policies"
    roles:
      - install-neuvector
    make: "make security"
    ram_mb: 3072          # NeuVector controller + enforcer + scanner: ~2.5GB
    min_nodes: 1
    min_cluster_ram_gb: 8
    min_ram_gb_server: 4
    requires: [networking]
    what_you_get:
      - "NeuVector — real-time container process and network monitoring"
      - "Vulnerability scanning for all running images"
      - "Network policy enforcement at layer 4/7"
      - "Zero-trust security posture for pods"
    notes:
      - "Uses dedicated LoadBalancer (not HTTPRoute) — NeuVector serves its own HTTPS on 8443"
      - "Fixed IP: 192.168.178.204 (Cilium LB-IPAM, separate from gateway .200)"
      - "Cilium Gateway API does NOT support TLS passthrough — hence dedicated LB"

  # ── Meta-stacks (predefined combinations) ────────────────────────────────────
  # These are not deployed directly — they describe well-known combinations.
  # Use their make commands as a sequence.
  # Storage notes:
  #   - make storage (storage-nas) MUST come before observability/ai/security
  #   - Pi-hole always uses local-path (forced — not configurable)
  #   - Without NAS: pass --extra-vars '<role>_storage_class: local-path' per role

  _quick_meta:
    kind: meta
    label: "Quick Cluster"
    description: "Minimum viable K3s cluster — working kubectl + Cilium CNI. Nothing else. DIY."
    stacks: [quick]
    make_sequence:
      - "make core && make networking"
    ram_mb_total: 1280
    notes:
      - "Fastest path to a working cluster (~5 min)"
      - "local-path StorageClass available immediately"
      - "No ingress, no TLS, no DNS, no storage CSI — fully DIY from here"

  _foundation_meta:
    kind: meta
    label: "Foundation"
    description: "Opinionated base — K3s + Cilium + TLS + DNS + GitOps. Start here for full stack."
    stacks: [core, networking, ingress, dns, gitops]
    make_sequence:
      - "make core && make networking"
      - "make ingress"
      - "make dns"
      - "make gitops"
    ram_mb_total: 2304

  _ai_stack_meta:
    kind: meta
    label: "AI Stack"
    description: "Foundation + NAS storage + AI assistant platform"
    stacks: [core, networking, ingress, dns, gitops, storage-nas, ai]
    make_sequence:
      - "make core && make networking"
      - "make ingress && make dns && make gitops"
      - "make storage"
      - "make ai && make ai-holmes && make kagent"
    ram_mb_total: 12672
    notes:
      - "make storage MUST run before make ai (registry needs smb-nas PVC)"

  _observability_stack_meta:
    kind: meta
    label: "Observability Stack"
    description: "Foundation + full metrics/logs/traces"
    stacks: [core, networking, ingress, dns, gitops, observability]
    make_sequence:
      - "make core && make networking"
      - "make ingress && make dns && make gitops"
      - "make observability"
    ram_mb_total: 10496

  _observability_stack_meta:
    kind: meta
    label: "Observability Stack"
    description: "Foundation + NAS storage + full metrics/logs/traces"
    stacks: [core, networking, ingress, dns, gitops, storage-nas, observability]
    make_sequence:
      - "make core && make networking"
      - "make ingress && make dns && make gitops"
      - "make storage"
      - "make observability"
    ram_mb_total: 10624
    notes:
      - "make storage MUST run before make observability (Prometheus/Loki need smb-nas PVC)"
      - "Without NAS: set kps_storage_class: local-path and loki_storage_class: local-path"

  _security_stack_meta:
    kind: meta
    label: "Security Stack"
    description: "Foundation + NAS storage + container runtime security"
    stacks: [core, networking, ingress, dns, gitops, storage-nas, security]
    make_sequence:
      - "make core && make networking"
      - "make ingress && make dns && make gitops"
      - "make storage"
      - "make security"
    ram_mb_total: 5504
    notes:
      - "make storage MUST run before make security (NeuVector needs smb-nas PVC)"

  _full_stack_meta:
    kind: meta
    label: "Full Stack"
    description: "Everything: Foundation + NAS storage + AI + Observability + Security"
    stacks: [core, networking, ingress, dns, gitops, storage-nas, observability, ai, security]
    make_sequence:
      - "make core && make networking"
      - "make ingress && make dns && make gitops"
      - "make storage"
      - "make observability"
      - "make ai && make ai-holmes && make kagent"
      - "make security"
    ram_mb_total: 22656   # ~22GB — needs 24GB+ cluster
    notes:
      - "make storage is step 3 — MUST precede observability, ai, security"
      - "Pi-hole always uses local-path regardless (forced, SQLite)"


# ═══════════════════════════════════════════════════════════════════════════════
# PLANNED STACKS — not yet implemented, placeholders for future work
#
# status: planned  →  no make target yet, no Ansible roles yet
# To implement: write the roles, add to bootstrap.yml, remove status: planned
# ═══════════════════════════════════════════════════════════════════════════════

  # ── GitOps alternatives ───────────────────────────────────────────────────────

  gitops-alternatives:
    kind: behavioral
    status: planned
    label: "GitOps Alternatives"
    behavior: "GitOps tooling beyond ArgoCD — Flux, Helm-native, Kustomize standalone"
    what_you_get:
      - "Flux v2 — GitOps operator with Helm controller + Kustomize controller"
      - "Kustomize standalone — overlay-based config management without a controller"
      - "Helm-native GitOps — Helmfile + Helm Secrets + Helm Diff"
      - "Comparison: ArgoCD (UI-first, app model) vs Flux (API-first, Git-native)"
    teaches:
      - "Pull-based vs push-based GitOps — security model differences"
      - "Flux image automation — auto-update when new image tag pushed"
      - "Kustomize overlays — base + patches pattern for multi-env"
      - "Helmfile — declarative multi-chart releases, equivalent to ArgoCD App of Apps"
      - "SOPS + age/gpg — secret encryption in Git"
    make: "# Not yet implemented — use make gitops for ArgoCD (current default)"
    ram_mb: 384
    min_nodes: 1
    requires: [core, networking]
    notes:
      - "ArgoCD remains the default — this stack is for comparison/learning"
      - "Flux + ArgoCD can coexist on the same cluster (different namespaces)"
      - "Kustomize is already bundled in kubectl — no extra install"

  # ── Data Engineering ──────────────────────────────────────────────────────────

  data-engineering:
    kind: behavioral
    status: planned
    label: "Data Engineering"
    behavior: "Batch and stream data processing on K8s — pipelines, queues, workflows"
    what_you_get:
      - "Apache Spark on K8s — SparkOperator (Google) for batch ETL jobs"
      - "Apache Kafka — Strimzi operator, distributed event streaming"
      - "Apache Flink — StatefulSet-based stream processing"
      - "Apache Airflow — KubernetesExecutor, DAG-based workflow orchestration"
      - "Apache Superset — BI dashboards on top of cluster-local data"
    teaches:
      - "Spark executor scheduling — K8s as Spark cluster manager"
      - "Kafka partition replication — distributed log storage on K8s PVCs"
      - "Flink checkpointing to S3/MinIO — stateful streaming on K8s"
      - "Airflow KubernetesExecutor — each DAG task runs as an independent K8s pod"
      - "Batch vs streaming — when to use Spark vs Flink vs Kafka Streams"
    make: "# Not yet implemented"
    ram_mb: 8192          # Kafka+ZK: ~2GB, Spark operator: ~512MB, Airflow: ~2GB
    min_nodes: 3
    min_ram_gb_server: 16
    requires: [core, networking, storage-nas]
    notes:
      - "NAS storage required — Kafka and Airflow need fast persistent PVCs"
      - "Spark and Flink are CPU/memory intensive — RK1 nodes recommended"
      - "Strimzi Kafka operator is production-grade and ARM64 compatible"
      - "MinIO (S3-compatible) can replace external object storage"

  # ── Database Operators ────────────────────────────────────────────────────────

  databases:
    kind: behavioral
    status: planned
    label: "Database Operators"
    behavior: "Database-as-a-service on K8s — PostgreSQL, MySQL, Redis, MongoDB via operators"
    what_you_get:
      - "CloudNativePG — PostgreSQL operator (CNCF, production-grade, ARM64)"
      - "KubeDB — multi-database operator (Postgres, MySQL, Redis, MongoDB, Elasticsearch)"
      - "Vitess — MySQL horizontal sharding for large-scale workloads (PlanetScale origin)"
      - "Redis Operator (OT-HELM) — HA Redis clusters"
      - "Zalando Postgres Operator — battle-tested Postgres with Patroni HA"
    teaches:
      - "Operator pattern — CRDs that manage stateful workloads declaratively"
      - "CloudNativePG HA — primary/replica with automatic failover"
      - "Vitess VSchema — how sharding rules are defined and enforced"
      - "Backup to S3/MinIO — automated PITR (point-in-time recovery)"
      - "Connection pooling — PgBouncer built into CloudNativePG"
    make: "# Not yet implemented"
    ram_mb: 2048          # CloudNativePG: ~512MB per instance; KubeDB operator: ~256MB
    min_nodes: 1
    requires: [core, networking, storage-nas]
    notes:
      - "CloudNativePG is the recommended starting point — CNCF sandbox, ARM64, simple"
      - "KubeDB is commercial (free tier limited) but covers many DB engines"
      - "Vitess requires significant operational complexity — only for scale"
      - "All operators support ARM64 natively"

  # ── ML Platform ──────────────────────────────────────────────────────────────

  ml-platform:
    kind: behavioral
    status: planned
    label: "ML Platform"
    behavior: "Machine learning lifecycle on K8s — training, tracking, serving, feature store"
    what_you_get:
      - "Kubeflow — full MLOps platform (pipelines, notebooks, serving, training operators)"
      - "MLflow — experiment tracking, model registry, model serving"
      - "Feast — feature store for ML (online + offline feature serving)"
      - "Seldon Core / KServe — model serving (REST/gRPC, canary, A/B testing)"
      - "Ray — distributed Python + Ray Tune + Ray Serve (LLM serving)"
    teaches:
      - "Kubeflow Pipelines — DAG-based ML workflows with artifact tracking"
      - "Training operators — PyTorchJob, TFJob, MXNetJob on K8s"
      - "KServe InferenceService — standard K8s CRD for model deployment"
      - "Ray cluster autoscaling — dynamic worker pools for distributed training"
      - "Feature stores — decoupling feature computation from model training"
    make: "# Not yet implemented"
    ram_mb: 12288         # Kubeflow lightweight: ~6GB; MLflow: ~512MB; KServe: ~1GB
    min_nodes: 2
    min_ram_gb_server: 16
    requires: [core, networking, storage-nas]
    notes:
      - "Kubeflow full install is heavy (12GB+) — start with MLflow only"
      - "KServe is the Kubeflow model serving component, usable standalone"
      - "RK1 nodes (31GB RAM) are suitable for small model training + inference"
      - "For LLM serving: use existing AI stack (Hermes + LiteLLM), not Kubeflow"
      - "NPU (/dev/rknpu0) support in Kubeflow is experimental as of 2025"

  # ── Advanced Networking / Service Mesh ───────────────────────────────────────

  networking-advanced:
    kind: behavioral
    status: planned
    label: "Advanced Networking / Service Mesh"
    behavior: "Deep networking — service mesh, mTLS everywhere, traffic management, canary deployments"
    what_you_get:
      - "Cilium Service Mesh — eBPF-native, no sidecar proxies (Envoy optional per-service)"

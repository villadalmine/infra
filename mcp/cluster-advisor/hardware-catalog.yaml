# Hardware catalog — boards you can buy to build or expand a K8s homelab cluster
#
# Design rules:
#   - Each entry is self-contained — no cross-references that can break
#   - price_usd is approximate — always check vendor URL for current price
#   - k8s_tier matches hardware profiles: nano/micro/small/medium/large
#   - unlocks_stacks references stacks.yaml keys (soft reference — unknown keys skipped)
#   - Add new boards by appending — no code changes needed
#   - form_factor: sbc / module / cluster-board / mini-pc / server
#
# K8s readiness checklist (must-haves):
#   cgroups_v2: required for K3s (kernel param or Ubuntu 22.04+)
#   ebpf: required for Cilium CNI (kernel ≥5.4, 64-bit only)
#   nvme: strongly recommended for etcd (eMMC borderline, SD not recommended)
#
# price_updated: approximate date of last price check (YYYY-MM format)

boards:

  # ── Raspberry Pi family ───────────────────────────────────────────────────────

  rpi5-8gb:
    name: "Raspberry Pi 5"
    variant: "8GB"
    cpu: "Cortex-A76 × 4 @ 2.4GHz"
    arch: arm64
    ram_gb: 8
    storage_type: "NVMe via M.2 HAT (sold separately)"
    storage_builtin: "microSD (not recommended for K8s)"
    has_npu: false
    has_gpu: false  # VideoCore VII — display only, not useful for ML
    cgroups_v2: true
    ebpf: true  # kernel 6.6 on Ubuntu 24.04
    k8s_tier: micro
    form_factor: sbc
    price_usd: 80
    price_updated: "2025-01"
    vendors:
      - name: "Raspberry Pi (official)"
        url: "https://www.raspberrypi.com/products/raspberry-pi-5/"
      - name: "Adafruit"
        url: "https://www.adafruit.com/product/5812"
      - name: "Pimoroni (EU)"
        url: "https://shop.pimoroni.com/products/raspberry-pi-5"
    unlocks_stacks: [core, networking, ingress, dns, gitops]
    good_for:
      - "Control-plane node (with NVMe HAT)"
      - "General K8s worker"
      - "Beginner and DevOps profiles"
    hardware_add_ons:
      - name: "Raspberry Pi M.2 HAT+"
        price_usd: 12
        why: "Enables NVMe SSD — required for etcd control-plane"
        url: "https://www.raspberrypi.com/products/m2-hat-plus/"
    notes:
      - "Uses 64-bit Ubuntu 24.04 (kernel 6.6) — full eBPF support"
      - "PCIe Gen 2 × 1 via M.2 HAT — NVMe latency ~0.5ms (good for etcd)"
      - "Requires active cooling for sustained K8s workloads"
      - "5V/5A USB-C power supply required"

  rpi5-4gb:

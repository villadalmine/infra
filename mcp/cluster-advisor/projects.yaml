# Project catalog — CNCF membership, license, GitHub, suitability, maintenance health
#
# Used by: stack_projects() MCP tool
# Cross-referenced with: survey/*.json (actual cluster hardware)
#
# Fields:
#   cncf_status:      graduated | incubating | sandbox | lfai | none
#   license:          apache-2.0 | mit | agpl-3.0 | mpl-2.0 | gpl-2.0 | mixed | commercial
#   oss:              true = fully open source  |  false = has paid/proprietary tier
#   arm64:            true | false | partial
#   stars_approx:     GitHub star count (approximate, updated field shows when)
#   suitable_for:     [homelab, smb, enterprise, testing, edge]
#   stacks:           which stacks.yaml keys reference this project
#
# Maintenance health fields (update periodically — check github releases page):
#   last_release:     "YYYY-MM"  — month of most recent release tag
#   release_cadence:  "monthly" | "quarterly" | "6-monthly" | "irregular" | "LTS"
#   maintained:       true | false | "community" (no corporate backing)
#   health_notes:     free text — e.g. "very active, 2-week release cycle"
#
# How to refresh:
#   1. Go to github.com/<org>/<repo>/releases
#   2. Note the date of the most recent tag
#   3. Count releases in the last 12 months → cadence
#   4. Check if there are commits in the last 90 days → maintained: true/false
#
# Maintenance → recommended use mapping:
#   last_release < 6 months + maintained: true  → safe for production
#   last_release 6-12 months               → use with care, check changelog
#   last_release > 12 months or maintained: false → avoid or fork

